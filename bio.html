<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Links Oficiais | BITTO</title>

    <style>
        :root {
            /* === PALETA LIGHT MODE REFINADA === */
            --bg-main: #f8fafc; /* Cinza claríssimo */
            --card-bg: #ffffff;
            --primary: #0035ff;
            --text-main: #0f172a; /* Azul escuro quase preto */
            --text-sec: #64748b; /* Cinza médio */
            --border: #e2e8f0;
            
            --shadow-soft: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-hover: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100dvh;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === PERFIL === */
        .profile-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar-container {
            width: 96px;
            height: 96px;
            margin: 0 auto 16px;
            position: relative;
        }
        
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow-soft);
        }

        .logo-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .logo-title span { color: var(--primary); }

        .bio-text {
            font-size: 0.9rem;
            color: var(--text-sec);
            font-weight: 500;
        }

        /* === LISTA DE LINKS === */
        .links-list {
            display: flex; flex-direction: column; gap: 12px;
            width: 100%;
        }

        .link-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            display: flex; 
            align-items: center; 
            gap: 16px;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }

        .link-card:active { transform: scale(0.98); }

        .link-icon {
            width: 40px; height: 40px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }
        
        .link-info { display: flex; flex-direction: column; }

        .link-title {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .link-desc {
            color: var(--text-sec);
            font-size: 0.8rem;
        }

        /* Destaque sutil */
        .link-card.featured {
            background: var(--primary);
            border-color: var(--primary);
        }
        .link-card.featured .link-title { color: white; }
        .link-card.featured .link-desc { color: rgba(255,255,255,0.8); }
        .link-card.featured .link-icon { background: rgba(255,255,255,0.2); color: white; }

        /* === REDES SOCIAIS === */
        .social-section {
            margin-top: 32px;
            display: flex;
            gap: 20px;
        }

        .social-btn {
            color: var(--text-sec);
            transition: 0.2s;
            text-decoration: none;
        }
        
        .social-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .social-btn:hover { color: var(--primary); transform: scale(1.1); }

        footer { margin-top: auto; padding-top: 40px; }
        .logo-footer {
            font-size: 0.7rem;
            font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Animações */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: slideUp 0.5s ease forwards; }
    </style>
</head>
