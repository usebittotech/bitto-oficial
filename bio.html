<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Bitto</title>
    <meta name="description" content="Acesse todos os meus links e projetos.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Cores extraídas do seu loading.css e index.html */
            --bg-dark: #0a0a0b;       /* Fundo Dark */
            --primary: #0035ff;       /* Azul Bitto */
            --accent: #ccff00;        /* Neon Verde */
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: var(--font-body);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            /* Gradiente de fundo sutil */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 53, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(204, 255, 0, 0.05) 0%, transparent 40%);
        }

        /* Container Central */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 24px;
            position: relative;
            z-index: 10;
        }

        /* Botão de Compartilhar (Topo) */
        .top-actions {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .share-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--white);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .share-btn:hover {
            background: var(--white);
            color: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Área do Perfil */
        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-dark);
            /* Animação de brilho igual ao seu loading.css */
            box-shadow: 0 0 0 2px var(--primary); 
        }

        /* Efeito de Status/Badge */
        .badge {
            position: absolute;
            bottom: 5px;
            right: 0;
            background: var(--accent);
            color: var(--bg-dark);
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            border: 3px solid var(--bg-dark);
        }

        h1 {
            font-family: var(--font-heading);
            font-weight: 800; /* Extra bold do Outfit */
            font-size: 2rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        
        h1 span { color: var(--primary); }

        .bio {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        /* Lista de Links */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--white);
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Efeito Hover nos Links */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 53, 255, 0.3);
        }

        /* Ícone de seta que aparece no hover */
        .link-icon {
            opacity: 0.5;
            transition: 0.3s;
        }
        .link-item:hover .link-icon {
            opacity: 1;
            transform: translateX(5px);
            color: var(--accent);
        }

        /* Link DESTAQUE (Estilo especial) */
        .link-item.featured {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
        }
        .link-item.featured:hover {
            background: #0026e6; /* Um pouco mais escuro no hover */
            box-shadow: 0 10px 40px -10px rgba(0, 53, 255, 0.6);
        }
        .link-item.featured .link-icon {
            color: var(--white);
            opacity: 1;
        }

        /* Rodapé */
        footer {
            margin-top: 60px;
            text-align: center;
        }
        
        .footer-logo {
            font-family: var(--font-heading);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Toast Notification (Copiado!) */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--white);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-family: var(--font-body);
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Animação sutil de fundo */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

    </style>
</head>
<body>

    <div class="top-actions">
        <button class="share-btn" onclick="copyPageUrl()" aria-label="Copiar Link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        </button>
    </div>

    <div class="container">
        
        <header class="profile-section">
            <div class="avatar-wrapper animate-float">
                <img src="https://placehold.co/200x200/0035ff/ffffff?text=B" alt="Foto de Perfil" class="avatar">
                <span class="badge">PRO</span>
            </div>
            
            <h1>Bitto<span>.</span></h1>
            <p class="bio">Estude 3x mais rápido com Inteligência Artificial. Acesse nossos canais oficiais.</p>
        </header>

        <main class="links-list">
            
            <a href="index.html" class="link-item featured">
                <span>Acessar Site Oficial</span>
                <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>

            <a href="https://instagram.com/seu_perfil" target="_blank" class="link-item">
                <span>Siga no Instagram</span>
                <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>

            <a href="https://wa.me/55999999999" target="_blank" class="link-item">
                <span>Fale Conosco</span>
                <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.12 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </a>

        </main>

        <footer>
            <a href="index.html" class="footer-logo">BITTO TECHNOLOGIES © 2026</a>
        </footer>

    </div>

    <div id="toast" class="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Link copiado com sucesso!
    </div>

    <script>
        function copyPageUrl() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('active');
                
                setTimeout(() => {
                    toast.classList.remove('active');
                }, 2500);
            });
        }
    </script>
</body>
</html>
