<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Links Oficiais | BITTO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0035ff;
            --primary-glow: rgba(0, 53, 255, 0.4);
            --bg: #030304;
            --text: #ffffff;
            --text-sec: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* === FUNDO DE ALTA IMERSÃO === */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #001a80 0%, transparent 50%);
        }

        .mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: #030304;
            background-image: 
                radial-gradient(at 0% 100%, rgba(0, 53, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(204, 255, 0, 0.03) 0px, transparent 50%);
            animation: meshMove 15s infinite alternate ease-in-out;
        }

        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        .container {
            width: 100%;
            max-width: 410px;
            padding: 70px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === PERFIL STATUS === */
        .profile {
            text-align: center;
            margin-bottom: 54px;
            animation: fadeInScale 1s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .avatar-container {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 28px;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 44px;
            background: #0a0a0b;
            padding: 8px;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 5;
        }

        .avatar-ring {
            position: absolute; inset: -3px;
            background: linear-gradient(135deg, var(--primary), #ccff00);
            border-radius: 46px;
            z-index: 1;
            opacity: 0.3;
            filter: blur(8px);
            animation: ringSpin 6s infinite linear;
        }

        @keyframes ringSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.4rem;
            letter-spacing: -1.5px;
            margin-bottom: 6px;
        }
        .logo-title span { color: var(--primary); }

        .bio-text {
            font-size: 0.95rem;
            color: var(--text-sec);
            font-weight: 500;
            max-width: 280px;
            line-height: 1.4;
        }

        /* === LINKS TURBINADOS === */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--card-border);
            padding: 22px;
            border-radius: 30px;
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Hover & Tap Effect */
        .link-card::before {
            content: "";
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .link-card:active {
            transform: scale(0.97) translateY(2px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .link-card:active::before { transform: translateX(100%); }

        .card-left { display: flex; align-items: center; gap: 20px; }

        .icon-box {
            width: 56px; height: 56px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text);
            border: 1px solid var(--card-border);
            transition: 0.4s;
        }

        .link-card:active .icon-box {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 53, 255, 0.3);
        }

        .title-main { 
            display: block;
            color: var(--text);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
        }
        .desc-sub {
            color: var(--text-sec);
            font-size: 0.85rem;
            margin-top: 2px;
            font-weight: 500;
        }

        /* Card Site Oficial (Featured) */
        .featured {
            background: var(--primary);
            border: none;
            box-shadow: 0 20px 40px -10px rgba(0, 53, 255, 0.4);
        }
        .featured .title-main { color: white; }
        .featured .desc-sub { color: rgba(255, 255, 255, 0.7); }
        .featured .icon-box { background: rgba(255, 255, 255, 0.15); border: none; }

        /* === FOOTER & SHARE === */
        .footer-section {
            margin-top: 50px;
            display: flex; flex-direction: column; align-items: center; gap: 32px;
            width: 100%;
        }

        .share-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 14px 30px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            display: flex; align-items: center; gap: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .share-pill:active { transform: scale(1.1); background: white; color: black; }

        .social-row { display: flex; gap: 30px; }
        .social-row a { color: var(--text-sec); transition: 0.4s; }
        .social-row a:active { color: var(--primary); transform: translateY(-5px) scale(1.2); }

        footer {
            font-size: 0.75rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        /* Staggered Entrance */
        .stagger {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .s-1 { animation-delay: 0.1s; }
        .s-2 { animation-delay: 0.2s; }
        .s-3 { animation-delay: 0.3s; }
        .s-4 { animation-delay: 0.4s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>
