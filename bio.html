<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Oficiais | Bitto</title>
    <meta name="description" content="Acesse os links oficiais da Bitto. Estudo inteligente com IA.">
    <meta name="theme-color" content="#0a0a0b">
    
    <link rel="icon" type="image/png" href="imagens/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* === PALETA DARK MODE === */
            --bg-main: #0a0a0b;       /* Preto Fundo */
            --card-bg: #141416;       /* Cinza Dark (Cartões) */
            --primary: #0035ff;       /* Azul Bitto */
            --accent: #ccff00;        /* Neon Verde */
            --text-main: #ffffff;     
            --text-sec: #9ca3af;      
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 20px 40px -5px rgba(0, 53, 255, 0.25);
            
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        /* === PERFIL === */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            position: relative;
        }
        
        .avatar-pulse {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulseRing 3s infinite;
            opacity: 0;
        }
        @keyframes pulseRing {
            0% { transform: scale(0.95); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-main);
            box-shadow: var(--shadow-sm);
            background-color: var(--bg-main);
            position: relative;
            z-index: 2;
        }

        .status-dot {
            position: absolute;
            bottom: 5px; right: 5px;
            width: 24px; height: 24px;
            background: var(--accent);
            border: 3px solid var(--bg-main);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 3;
            color: var(--bg-main);
        }
        .status-dot svg { width: 14px; height: 14px; stroke-width: 3; }

        .logo-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }
        .logo-title span { color: var(--primary); }

        .bio-text {
            font-size: 0.95rem;
            color: var(--text-sec);
            line-height: 1.5;
            max-width: 95%;
            margin: 0 auto;
        }

        /* === BOTÃO DE COMPARTILHAR === */
        .share-pill {
            position: absolute;
            top: -10px; right: 0;
            background: var(--card-bg);
            padding: 8px 14px;
            border-radius: 30px;
            display: flex; align-items: center; gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: 0.3s ease;
            z-index: 10;
            border: 1px solid var(--border-glass);
        }
        .share-pill:hover {
            transform: translateY(-2px);
            background: var(--primary);
            border-color: var(--primary);
        }

        /* === LISTA DE LINKS === */
        .links-list {
            display: flex; flex-direction: column; gap: 14px;
        }

        .link-card {
            background: var(--card-bg);
            padding: 18px 22px;
            border-radius: 18px;
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-glass);
        }

        /* Hover Effect */
        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.2);
            background: #1e1e20;
        }

        .link-info { display: flex; flex-direction: column; }

        .link-title {
            color: var(--text-main);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.05rem;
        }
        .link-desc {
            color: var(--text-sec);
            font-size: 0.85rem;
            margin-top: 3px;
            font-weight: 500;
        }

        .link-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main);
            transition: 0.3s;
        }
        
        .link-card:hover .link-icon {
            background: var(--primary);
            color: var(--text-main);
            transform: rotate(-5deg);
        }
        .link-card:hover .link-title { color: var(--primary); }

        /* === LINK DESTAQUE (Azul) === */
        .link-card.featured {
            background: var(--primary);
            border: 1px solid var(--primary);
        }
        .link-card.featured .link-title { color: #ffffff; }
        .link-card.featured .link-desc { color: rgba(255,255,255,0.8); }
        .link-card.featured .link-icon {
            background: rgba(255,255,255,0.15);
            color: var(--accent);
        }
        .link-card.featured:hover {
            background: #0026e6;
            box-shadow: 0 15px 40px -10px rgba(0, 53, 255, 0.5);
        }
        .link-card.featured:hover .link-icon {
             background: var(--accent); color: var(--bg-main);
        }

        /* === SOCIAL MEDIA SECTION === */
        .social-section {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-sec);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .social-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .social-btn:hover {
            background: var(--white);
            color: var(--bg-main);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }
        /* Cor específica no hover para cada rede */
        .social-btn.tiktok:hover { color: #000; box-shadow: 0 5px 20px rgba(0, 242, 234, 0.4); }
        .social-btn.insta:hover { color: #E1306C; }
        .social-btn.x:hover { color: #000; }

        /* Footer */
        footer { margin-top: 40px; text-align: center; }
        .logo-footer {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--text-sec);
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* Toast Notificação */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent); color: var(--bg-main);
            padding: 10px 24px; border-radius: 30px;
            font-weight: 800; font-size: 0.9rem;
            opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(204, 255, 0, 0.3); z-index: 100;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Animação */
        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; transform: translateY(20px); }
        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; }
        .d-3 { animation-delay: 0.3s; } .d-4 { animation-delay: 0.4s; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>

    <script>
        const officialUrl = 'https://www.usebitto.com/bio.html';

        function shareBio() {
            if (navigator.share) {
                navigator.share({
                    title: 'Links Bitto',
                    url: officialUrl
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(officialUrl).then(() => {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                });
            }
        }
    </script>
