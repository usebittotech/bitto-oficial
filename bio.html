<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Links Oficiais | BITTO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0035ff;
            --accent: #ccff00;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-sec: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* === IA NEBULA AMBIENCE === */
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 53, 255, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(0, 53, 255, 0.05) 0%, transparent 40%);
            animation: nebulaPulse 12s infinite alternate ease-in-out;
        }

        @keyframes nebulaPulse {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .container {
            width: 100%;
            max-width: 415px;
            padding: 70px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* === HEADER === */
        .profile {
            text-align: center;
            animation: entrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .avatar-box {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 24px;
        }

        .avatar-img {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 40px;
            background: #080808;
            padding: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            z-index: 2;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -2.5px;
            background: linear-gradient(to bottom, #fff 60%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* === LINKS GRID (CONTEÚDO ORIGINAL) === */
        .links-grid {
            display: flex; flex-direction: column; gap: 14px;
            width: 100%;
        }

        .link-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 20px;
            border-radius: 28px;
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .link-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .card-body { display: flex; align-items: center; gap: 18px; }

        .icon-circle {
            width: 52px; height: 52px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            border: 1px solid var(--border);
        }

        .title-main { display: block; font-weight: 700; font-size: 1.05rem; color: #fff; }
        .desc-sub { display: block; font-size: 0.8rem; color: var(--text-sec); margin-top: 2px; }

        /* Card Destaque */
        .featured {
            background: var(--primary);
            border: none;
            box-shadow: 0 20px 40px -10px rgba(0, 53, 255, 0.4);
        }
        .featured .desc-sub { color: rgba(255, 255, 255, 0.7); }
        .featured .icon-circle { background: rgba(255, 255, 255, 0.15); border: none; }

        /* === SEÇÃO DE SUPORTE DIFERENCIADA === */
        .support-box {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 24px;
            border: 1px dashed var(--border);
            text-align: center;
        }

        .support-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 16px;
            display: block;
        }

        .support-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            color: black;
            padding: 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .support-link:active { transform: scale(0.95); }

        /* === FOOTER === */
        .footer {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }

        .socials { display: flex; gap: 25px; }
        .socials a { color: var(--text-sec); transition: 0.3s; }
        .socials a:active { color: var(--primary); transform: scale(1.3); }

        .copyright {
            font-size: 0.65rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Animações Sequenciais */
        .reveal { opacity: 0; animation: revealUp 0.8s forwards; }
        .r-1 { animation-delay: 0.1s; }
        .r-2 { animation-delay: 0.2s; }
        .r-3 { animation-delay: 0.3s; }
        .r-4 { animation-delay: 0.4s; }

        @keyframes entrance {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes revealUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
