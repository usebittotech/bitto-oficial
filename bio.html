<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BITTO | Ecosystem</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #0035ff;
            --p-dark: #0026b3;
            --p-light: rgba(0, 53, 255, 0.08);
            --bg: #fdfdfe;
            --text: #050505;
            --text-s: #6b7280;
            --glass: rgba(255, 255, 255, 0.75);
            --b: 1px solid rgba(0, 53, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Efeito de IA no fundo */
        .ai-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 53, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(204, 255, 0, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 430px;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* === PROFILE HQ === */
        .profile {
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .avatar-box {
            position: relative;
            width: 130px; height: 130px;
            margin: 0 auto 24px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .avatar-box:active { transform: scale(0.9); }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 40px;
            background: white;
            padding: 10px;
            box-shadow: 0 30px 60px -12px rgba(0, 53, 255, 0.15);
            position: relative; z-index: 2;
        }

        .avatar-glow {
            position: absolute; inset: 0;
            background: var(--p);
            filter: blur(30px);
            opacity: 0.2;
            border-radius: 40px;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            from { opacity: 0.1; transform: scale(0.9); }
            to { opacity: 0.3; transform: scale(1.1); }
        }

        .title-group h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #050505, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            display: inline-block;
            background: var(--p-light);
            color: var(--p);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* === GRID DE LINKS PREMIUM === */
        .link-stack {
            display: flex; flex-direction: column; gap: 16px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 22px;
            border-radius: 28px;
            border: var(--b);
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .card:active {
            transform: scale(0.97) translateY(2px);
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card-content { display: flex; align-items: center; gap: 18px; }

        .icon-circle {
            width: 56px; height: 56px;
            background: white;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--p);
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            transition: 0.4s;
        }

        .card:active .icon-circle {
            background: var(--p);
            color: white;
            transform: scale(0.9);
        }

        .text-group .t {
            display: block;
            font-weight: 700; font-size: 1.1rem;
            color: var(--text);
        }

        .text-group .d {
            font-size: 0.85rem; color: var(--text-s);
            font-weight: 500;
        }

        .arrow {
            opacity: 0.3;
            transition: 0.3s;
            transform: translateX(-10px);
        }

        .card:hover .arrow, .card:active .arrow {
            opacity: 1; transform: translateX(0);
            color: var(--p);
        }

        /* CARD DESTAQUE (MAIN ACTION) */
        .main-card {
            background: var(--p);
            border: none;
            box-shadow: 0 20px 40px -10px rgba(0, 53, 255, 0.3);
        }
        .main-card .t { color: white !important; }
        .main-card .d { color: rgba(255,255,255,0.7) !important; }
        .main-card .icon-circle { background: rgba(255,255,255,0.15); color: white; }
        .main-card .arrow { color: white; opacity: 0.8; }

        /* === ACTIONS === */
        .footer-actions {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            margin-top: 20px;
        }

        .share-pill {
            background: white;
            border: var(--b);
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: 0.3s;
        }

        .share-pill:active { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 53, 255, 0.1); }

        .social-icons { display: flex; gap: 30px; }
        .social-icons a { color: var(--text-s); transition: 0.4s; }
        .social-icons a:active { color: var(--p); transform: scale(1.3); }

        /* Animação Stagger */
        .reveal {
            opacity: 0;
            animation: revealUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .r-1 { animation-delay: 0.1s; }
        .r-2 { animation-delay: 0.2s; }
        .r-3 { animation-delay: 0.3s; }
        .r-4 { animation-delay: 0.4s; }

        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="ai-bg"></div>

    <div class="container">
        
        <header class="profile reveal r-1">
            <div class="avatar-box">
                <div class="avatar-glow"></div>
                <img src="imagens/bittoofc.png" alt="Bitto Logo" class="avatar-img">
            </div>
            <div class="title-group">
                <span class="badge">Educação + IA</span>
                <h1>BITTO<span>.</span></h1>
                <p style="color: var(--text-s); font-weight: 500; font-size: 1.1rem;">Future-proof your learning.</p>
            </div>
        </header>

        <nav class="link-stack">
            <a href="pages/login.html" class="card main-card reveal r-2">
                <div class="card-content">
                    <div class="icon-circle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                    </div>
                    <div class="text-group">
                        <span class="t">Acessar Bitto App</span>
                        <span class="d">Entre na sua conta agora</span>
                    </div>
                </div>
                <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>

            <a href="index.html" class="card reveal r-3">
                <div class="card-content">
                    <div class="icon-circle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    </div>
                    <div class="text-group">
                        <span class="t">Ecossistema Bitto</span>
                        <span class="d">Nossa tecnologia e visão</span>
                    </div>
                </div>
                <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>

            <a href="site/parceiro.html" class="card reveal r-4">
                <div class="card-content">
                    <div class="icon-circle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    </div>
                    <div class="text-group">
                        <span class="t">Programa Partner</span>
                        <span class="d">Seja um embaixador oficial</span>
                    </div>
                </div>
                <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
        </nav>

        <div class="footer-actions reveal r-4">
            <button class="share-pill" onclick="share()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                Copy Business Link
            </button>

            <div class="social-icons">
                <a href="https://instagram.com/usebitto"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                <a href="https://tiktok.com/@usebitto"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg></a>
                <a href="https://x.com/usebitto"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>

            <footer style="margin-top: 10px; font-size: 0.7rem; font-weight: 800; color: #cbd5e1; letter-spacing: 2px; text-transform: uppercase;">
                Bitto Tech Lab © 2026
            </footer>
        </div>
    </div>

    <script>
        function share() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'Bitto Tech', url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert('Business Link Copied!');
            }
        }

        // Efeito de Parallax Suave no Avatar
        document.addEventListener('mousemove', (e) => {
            const avatar = document.querySelector('.avatar-box');
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            avatar.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
