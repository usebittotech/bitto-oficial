<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Oficiais | Bitto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* === VARIÁVEIS EXATAS DO SEU ARQUIVO loading.css === */
        :root {
            --bg: #f8f9ff;
            --primary: #0035ff;
            --accent: #ccff00;
            --dark: #0a0a0b;
            --white: #ffffff;
            --text-gray: #475569;
            --border: rgba(0,0,0,0.08);
            --shadow-glass: 0 12px 40px 0 rgba(0, 53, 255, 0.12);
            --shadow-hover: 0 20px 40px -10px rgba(0, 53, 255, 0.2);
            
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Textura de fundo sutil igual ao site */
            background-image: radial-gradient(circle at top right, rgba(0, 53, 255, 0.03) 0%, transparent 40%);
        }

        /* Container Central */
        .container {
            width: 100%;
            max-width: 460px;
            position: relative;
        }

        /* Botão de Compartilhar (Minimalista) */
        .share-btn {
            position: absolute;
            top: 0; right: 0;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text-gray);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            z-index: 10;
        }
        .share-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* Cabeçalho do Perfil */
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 10px;
        }

        .logo-text {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 2.2rem;
            color: var(--dark);
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-decoration: none;
            display: inline-block;
        }
        .logo-text span { color: var(--primary); }

        .bio-text {
            color: var(--text-gray);
            font-size: 1rem;
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        /* Lista de Links */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo dos Cartões (Igual aos cards do seu site) */
        .link-card {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 20px 24px;
            border-radius: 16px; /* Bordas arredondadas padrão moderno */
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Conteúdo do Link */
        .link-content {
            display: flex;
            flex-direction: column;
        }

        .link-title {
            color: var(--dark);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .link-desc {
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Ícone */
        .icon-box {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: #f1f3f9;
            color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        /* --- HOVER EFFECTS --- */
        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(0, 53, 255, 0.2);
        }
        .link-card:hover .link-title { color: var(--primary); }
        .link-card:hover .icon-box {
            background: var(--primary);
            color: var(--white);
        }

        /* --- LINK DESTAQUE (Primário) --- */
        /* Para o link principal, usamos o estilo do botão "Começar Agora" */
        .link-card.featured {
            background: var(--primary);
            border-color: var(--primary);
        }
        .link-card.featured .link-title { color: var(--white); }
        .link-card.featured .link-desc { color: rgba(255,255,255,0.8); }
        
        .link-card.featured .icon-box {
            background: rgba(255,255,255,0.2);
            color: var(--accent); /* O detalhe verde neon no fundo azul */
        }

        .link-card.featured:hover {
            background: #002cd6; /* Azul um pouco mais escuro */
            box-shadow: 0 20px 40px -10px rgba(0, 53, 255, 0.4);
        }
        .link-card.featured:hover .icon-box {
            background: var(--accent);
            color: var(--primary);
        }

        /* Footer */
        footer {
            margin-top: 60px;
            text-align: center;
        }
        
        .copyright {
            color: var(--text-gray);
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.7;
        }

        /* Badge "Novo" opcional */
        .badge {
            background: var(--accent);
            color: var(--dark);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            margin-left: 10px;
            vertical-align: middle;
            text-transform: uppercase;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Animação suave de entrada */
        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <button class="share-btn fade-in-up" onclick="copyLink()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        </button>

        <header class="profile-header fade-in-up">
            <a href="index.html" class="logo-text">BITTO<span>.</span></a>
            <p class="bio-text">Aprenda 3x mais rápido com Inteligência Artificial. A plataforma definitiva para universitários.</p>
        </header>

        <main class="links-list">
            
            <a href="index.html" class="link-card featured fade-in-up delay-1">
                <div class="link-content">
                    <span class="link-title">Acessar Plataforma</span>
                    <span class="link-desc">Crie sua conta ou faça login</span>
                </div>
                <div class="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                </div>
            </a>

            <a href="https://instagram.com/seu_perfil" target="_blank" class="link-card fade-in-up delay-2">
                <div class="link-content">
                    <span class="link-title">Instagram <span class="badge">Novo</span></span>
                    <span class="link-desc">Dicas de estudo diárias</span>
                </div>
                <div class="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </div>
            </a>

            <a href="https://wa.me/55999999999" target="_blank" class="link-card fade-in-up delay-3">
                <div class="link-content">
                    <span class="link-title">Suporte no WhatsApp</span>
                    <span class="link-desc">Fale com nosso time</span>
                </div>
                <div class="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.12 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>

        </main>

        <footer>
            <p class="copyright">© 2026 Bitto Tecnologia</p>
        </footer>

    </div>

    <div id="toast" class="toast">Link copiado!</div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
