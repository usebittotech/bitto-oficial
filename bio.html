<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Oficiais | Bitto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* === PALETA REFINADA === */
            --bg-gray: #eef2f6;       /* Cinza Premium (Fundo) */
            --card-bg: #ffffff;       /* Branco (Cartões) */
            --primary: #0035ff;       /* Azul Bitto */
            --accent: #ccff00;        /* Neon Verde */
            --dark: #0a0a0b;          /* Texto Principal */
            --text-gray: #64748b;     /* Texto Secundário */
            
            /* Sombras Suaves */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 20px 40px -5px rgba(0, 53, 255, 0.15);
            
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--dark);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            
            /* Padrão de Pontos Sutil (Dot Pattern) */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Container Central */
        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        /* === ÁREA DO PERFIL === */
        .profile-section {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        /* Avatar com Animação de Entrada */
        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            position: relative;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-bg); /* Borda branca para separar do cinza */
            box-shadow: var(--shadow-sm);
        }

        .status-dot {
            position: absolute;
            bottom: 5px; right: 5px;
            width: 20px; height: 20px;
            background: var(--accent);
            border: 3px solid var(--card-bg);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: var(--dark);
        }
        .logo-title span { color: var(--primary); }

        .bio-text {
            font-size: 0.95rem;
            color: var(--text-gray);
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        /* === BOTÃO DE COMPARTILHAR (Flutuante) === */
        .share-pill {
            position: absolute;
            top: 0; right: 0;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--dark);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: 0.3s ease;
            border: 1px solid transparent;
        }
        .share-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            color: var(--primary);
        }

        /* === LISTA DE LINKS === */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            background: var(--card-bg);
            padding: 18px 24px;
            border-radius: 18px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Efeito SHINE (Brilho que passa) */
        .link-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }
        .link-card:hover::after {
            left: 150%;
            transition: 0.7s ease-in-out;
        }

        /* Hover Card */
        .link-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-hover);
        }

        .link-info {
            display: flex; flex-direction: column;
        }

        .link-title {
            color: var(--dark);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.05rem;
        }
        .link-desc {
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .link-icon {
            width: 40px; height: 40px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--dark);
            transition: 0.3s;
        }
        
        /* Hover Icon */
        .link-card:hover .link-icon {
            background: var(--primary);
            color: var(--card-bg);
            transform: rotate(-10deg);
        }
        .link-card:hover .link-title { color: var(--primary); }

        /* === LINK DESTAQUE (Azul) === */
        .link-card.featured {
            background: var(--primary);
            color: var(--card-bg);
        }
        .link-card.featured .link-title { color: var(--card-bg); }
        .link-card.featured .link-desc { color: rgba(255,255,255,0.8); }
        .link-card.featured .link-icon {
            background: rgba(255,255,255,0.2);
            color: var(--accent); /* Detalhe Neon */
        }
        
        .link-card.featured:hover {
            background: #0026e6;
            box-shadow: 0 20px 40px -5px rgba(0, 53, 255, 0.4);
        }
        .link-card.featured::after {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Footer */
        footer {
            margin-top: 50px;
            text-align: center;
        }
        .logo-footer {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--text-gray);
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* Toast Notificação */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: var(--card-bg);
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Animação Entrada */
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0; transform: translateY(20px);
        }
        .d-1 { animation-delay: 0.1s; }
        .d-2 { animation-delay: 0.2s; }
        .d-3 { animation-delay: 0.3s; }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="share-pill fade-in" onclick="copyLink()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Compartilhar
        </div>

        <header class="profile-section fade-in">
            <div class="avatar-container">
                <img src="https://placehold.co/200x200/0035ff/ffffff?text=B" alt="Bitto" class="avatar">
                <div class="status-dot"></div>
            </div>
            
            <h1 class="logo-title">BITTO<span>.</span></h1>
            <p class="bio-text">A plataforma de estudo inteligente para universitários. Aprenda 3x mais rápido com IA.</p>
        </header>

        <main class="links-list">
            
            <a href="index.html" class="link-card featured fade-in d-1">
                <div class="link-info">
                    <span class="link-title">Acessar Plataforma</span>
                    <span class="link-desc">Login ou Criar conta</span>
                </div>
                <div class="link-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                </div>
            </a>

            <a href="https://instagram.com/seu_perfil" target="_blank" class="link-card fade-in d-2">
                <div class="link-info">
                    <span class="link-title">Instagram</span>
                    <span class="link-desc">Dicas diárias de estudo</span>
                </div>
                <div class="link-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </div>
            </a>

            <a href="https://wa.me/55999999999" target="_blank" class="link-card fade-in d-3">
                <div class="link-info">
                    <span class="link-title">Fale Conosco</span>
                    <span class="link-desc">Suporte via WhatsApp</span>
                </div>
                <div class="link-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.12 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>

        </main>

        <footer>
            <div class="logo-footer">BITTO TECNOLOGIA © 2026</div>
        </footer>

    </div>

    <div id="toast" class="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Link copiado!
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
