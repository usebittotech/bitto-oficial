<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Links Oficiais | BITTO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0035ff;
            --bg: #f8fafc;
            --text: #0a0a0b;
            --text-sec: #64748b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 53, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            /* Fundo dinâmico e suave */
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 53, 255, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(204, 255, 0, 0.04) 0px, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 50px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === PERFIL === */
        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .avatar-container {
            width: 110px; height: 110px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 35px;
            background: white;
            padding: 6px;
            box-shadow: 0 20px 40px rgba(0, 53, 255, 0.1);
            object-fit: contain;
            position: relative; z-index: 2;
        }

        .logo-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
        }
        .logo-title span { color: var(--primary); }

        .bio-text {
            font-size: 1rem;
            color: var(--text-sec);
            font-weight: 500;
            margin-top: 5px;
        }

        /* === LISTA DE LINKS (SUA ESCRITA ORIGINAL) === */
        .links-list {
            display: flex; flex-direction: column; gap: 14px;
            width: 100%;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 24px;
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card:active {
            transform: scale(0.96);
            background: white;
            border-color: var(--primary);
        }

        .card-main { display: flex; align-items: center; gap: 16px; }

        .icon-wrap {
            width: 48px; height: 48px;
            background: #f1f5f9;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            transition: 0.3s;
        }

        .link-card:active .icon-wrap {
            background: var(--primary);
            color: white;
        }

        .link-title { 
            display: block;
            color: var(--text);
            font-weight: 700;
            font-size: 1.05rem;
        }
        .link-desc {
            color: var(--text-sec);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Destaque (Conheça nossas ferramentas) */
        .featured {
            background: var(--primary);
            border: none;
            box-shadow: 0 15px 30px rgba(0, 53, 255, 0.2);
        }
        .featured .link-title { color: white; }
        .featured .link-desc { color: rgba(255,255,255,0.7); }
        .featured .icon-wrap { background: rgba(255,255,255,0.15); color: white; }

        /* === COMPARTILHAR & SOCIAL === */
        .footer-area {
            margin-top: 40px;
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }

        .share-button {
            background: white;
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-sec);
            display: flex; align-items: center; gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .socials { display: flex; gap: 24px; }
        .socials a { color: var(--text-sec); transition: 0.3s; }
        .socials a:active { color: var(--primary); transform: scale(1.2); }

        footer {
            font-size: 0.7rem;
            font-weight: 800;
            color: #cbd5e1;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger { animation: fadeIn 0.6s both; }
        .s-1 { animation-delay: 0.1s; }
        .s-2 { animation-delay: 0.2s; }
        .s-3 { animation-delay: 0.3s; }
        .s-4 { animation-delay: 0.4s; }

    </style>
</head>
<body>

            </div>

            <footer>BITTO TECNOLOGIA © 2026</footer>

    </div>

    <script>
        function share() {
            if (navigator.share) {
                navigator.share({ title: 'Bitto | Links', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copiado!');
            }
        }
    </script>
</body>
</html>
