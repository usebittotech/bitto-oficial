<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Bitto</title>
    <meta name="description" content="Acesse todos os meus links oficiais e projetos.">
    <meta name="theme-color" content="#0a0a0b">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta de Cores Bitto */
            --bg-dark: #0a0a0b;
            --primary: #0035ff;  /* Azul Elétrico */
            --accent: #ccff00;   /* Neon Verde/Amarelo */
            --white: #ffffff;
            
            /* Vidro e Bordas */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shine: rgba(255, 255, 255, 0.2);
            
            /* Fontes */
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: var(--font-body);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* =========================================
           FUNDO DINÂMICO (Orbes de Energia)
        ========================================= */
        .background-orbs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: moveOrb infinite ease-in-out alternate;
        }
        .orb-1 {
            top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: var(--primary);
            animation-duration: 15s;
        }
        .orb-2 {
            bottom: -20%; right: -20%; width: 60vw; height: 60vw;
            background: var(--accent);
            opacity: 0.2;
            animation-duration: 20s;
            animation-delay: -5s;
        }
        
        @keyframes moveOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 15%) scale(1.1); }
        }

        /* =========================================
           ESTRUTURA PRINCIPAL
        ========================================= */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 24px;
            position: relative;
            z-index: 10;
        }

        /* Botão de Compartilhar */
        .top-actions {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 20;
        }
        .share-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--white);
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Efeito elástico */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .share-btn:hover {
            background: var(--white);
            color: var(--bg-dark);
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        .share-btn:active { transform: scale(0.9); }

        /* Área do Perfil */
        .profile-section {
            text-align: center;
            margin-bottom: 45px;
            margin-top: 30px;
        }

        .avatar-wrapper {
            position: relative;
            width: 130px; height: 130px;
            margin: 0 auto 25px;
        }
        
        /* Animação de pulso constante na foto */
        .avatar-pulse {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 3px solid var(--primary);
            animation: pulseRing 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            opacity: 0;
        }
        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-dark);
            position: relative;
            z-index: 2;
            box-shadow: 0 0 20px rgba(0, 53, 255, 0.5); /* Glow azul na foto */
        }

        .badge {
            position: absolute;
            bottom: 0px; right: 0px;
            background: var(--accent);
            color: var(--bg-dark);
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 20px;
            border: 4px solid var(--bg-dark);
            z-index: 3;
            box-shadow: 0 5px 15px rgba(204, 255, 0, 0.3);
        }

        h1 {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            /* Texto Gradiente Neon */
            background: linear-gradient(135deg, var(--white) 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        /* Ponto neon piscando */
        h1 .dot {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
            display: inline-block;
            animation: blinkNeon 3s infinite;
        }
        @keyframes blinkNeon { 0%, 10%, 100% { opacity: 1; } 5% { opacity: 0.5; } }

        .bio {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 95%;
            margin: 0 auto;
            font-weight: 500;
        }

        /* =========================================
           LINKS INTERATIVOS (O coração da página)
        ========================================= */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 28px;
            
            /* Glassmorphism Avançado */
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); /* Sombra base */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            
            border-radius: 22px;
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            font-size: 1.1rem;
            
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Brilho interno no topo do cartão */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
            opacity: 0.5;
        }

        /* === EFEITOS DE HOVER E CLICK (Interação) === */
        
        /* Ao passar o mouse */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent); /* Borda Neon Verde ao passar o mouse */
            transform: translateY(-6px) scale(1.02); /* Levanta e cresce um pouco */
            /* Sombra colorida brilhante */
            box-shadow: 
                0 20px 40px -10px rgba(0, 53, 255, 0.4), /* Glow azul forte */
                inset 0 0 20px rgba(255, 255, 255, 0.05); /* Brilho interno */
        }

        /* Ao Clicar (Feedback Tátil) */
        .link-item:active {
            transform: scale(0.98) translateY(-2px); /* "Afunda" o botão */
            box-shadow: 0 5px 15px -5px rgba(0, 53, 255, 0.4);
            transition-duration: 0.1s; /* Resposta rápida */
        }

        /* Ícone da seta */
        .link-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transition: 0.4s ease;
        }
        .link-icon {
            opacity: 0.8;
            transition: 0.4s ease;
            color: var(--white);
        }
        
        /* Animação do ícone no hover do cartão pai */
        .link-item:hover .link-icon-wrapper {
            background: var(--accent);
            transform: rotate(-45deg); /* Gira a seta para cima */
        }
        .link-item:hover .link-icon {
            color: var(--bg-dark);
            opacity: 1;
        }

        /* Link DESTAQUE (Opcional: Use a classe .featured se quiser um link diferente) */
        .link-item.featured {
            background: linear-gradient(135deg, var(--primary), #0026e6);
            border-color: transparent;
        }
        .link-item.featured:hover {
            box-shadow: 0 20px 50px -10px rgba(0, 53, 255, 0.8); /* Glow azul muito forte */
            border-color: var(--white);
        }
        .link-item.featured .link-icon-wrapper { background: rgba(255,255,255,0.2); }
        .link-item.featured:hover .link-icon-wrapper { background: var(--white); }
        
        /* =========================================
           ANIMAÇÕES DE ENTRADA (Cascata)
        ========================================= */
        /* Classe base para elementos que vão animar */
        .animate-in {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        
        /* Delays para criar o efeito escada */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        .delay-4 { animation-delay: 0.55s; }
        .delay-5 { animation-delay: 0.7s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            margin-top: 70px;
            text-align: center;
            opacity: 0.5;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(150px) scale(0.9);
            background: var(--white);
            color: var(--primary);
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 800;
            font-family: var(--font-heading);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); /* Super elástico */
            z-index: 100;
            display: flex; align-items: center; gap: 10px;
        }
        .toast.active {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="top-actions animate-in delay-1">
        <button class="share-btn" onclick="copyPageUrl()" aria-label="Compartilhar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        </button>
    </div>

    <div class="container">
        
        <header class="profile-section animate-in delay-1">
            <div class="avatar-wrapper">
                <div class="avatar-pulse"></div>
                <img src="https://placehold.co/250x250/0035ff/ffffff?text=B" alt="Foto de Perfil" class="avatar">
                <span class="badge">BIO OFICIAL</span>
            </div>
            
            <h1>Bitto<span class="dot">.</span></h1>
            <p class="bio">A revolução nos seus estudos através da Inteligência Artificial. Conecte-se conosco.</p>
        </header>

        <main class="links-list">
            
            <a href="index.html" class="link-item animate-in delay-2">
                <span>Acessar Plataforma</span>
                <div class="link-icon-wrapper">
                    <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <a href="https://instagram.com/seu_perfil" target="_blank" class="link-item animate-in delay-3">
                <span>Instagram Oficial</span>
                <div class="link-icon-wrapper">
                     <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </div>
            </a>

            <a href="https://wa.me/55999999999" target="_blank" class="link-item animate-in delay-4">
                <span>Contato WhatsApp</span>
                <div class="link-icon-wrapper">
                    <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.12 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>

        </main>

        <footer class="animate-in delay-5">
            BITTO TECHNOLOGIES © 2026
        </footer>

    </div>

    <div id="toast" class="toast">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        LINK COPIADO!
    </div>

    <script>
        function copyPageUrl() {
            // Tenta usar a API de compartilhamento nativa do celular primeiro
            if (navigator.share) {
                navigator.share({
                    title: 'Links Bitto',
                    url: window.location.href
                }).catch(console.error);
            } else {
                // Fallback para copiar para a área de transferência no desktop
                navigator.clipboard.writeText(window.location.href).then(() => {
                    const toast = document.getElementById('toast');
                    toast.classList.add('active');
                    setTimeout(() => toast.classList.remove('active'), 3000);
                });
            }
        }
    </script>
</body>
</html>
