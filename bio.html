<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BITTO | Ecosystem Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #0035ff;
            --p-glow: rgba(0, 53, 255, 0.5);
            --bg: #000000;
            --t-main: #ffffff;
            --t-sec: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: default; }

        body {
            background-color: var(--bg);
            color: var(--t-main);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* === BACKGROUND CORTINA DE IA === */
        .ai-core {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% -10%, rgba(0, 53, 255, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(0, 53, 255, 0.05) 0%, transparent 40%);
            animation: coreBreath 8s infinite alternate ease-in-out;
        }

        @keyframes coreBreath {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 1; transform: scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 410px;
            padding: 80px 24px;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        /* === BRANDING SUPREMO === */
        .brand {
            text-align: center;
            perspective: 1000px;
        }

        .logo-aura {
            position: relative;
            width: 130px; height: 130px;
            margin: 0 auto 30px;
            transform-style: preserve-3d;
        }

        .aura-spin {
            position: absolute; inset: -15px;
            border: 2px solid var(--p);
            border-radius: 50px;
            opacity: 0.2;
            animation: spin 10s infinite linear;
        }

        .aura-spin.alt {
            inset: -8px;
            border: 1px solid #ccff00;
            animation-duration: 15s;
            animation-direction: reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 45px;
            background: #050505;
            padding: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0, 53, 255, 0.2);
            position: relative; z-index: 10;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -2.5px;
            background: linear-gradient(to bottom, #fff 40%, var(--p));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* === LINK ENGINE === */
        .stack {
            display: flex; flex-direction: column; gap: 18px;
        }

        .button {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 35px;
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--p);
            box-shadow: 0 0 30px var(--p-glow);
        }

        .button-content { display: flex; align-items: center; gap: 22px; }

        .icon-hex {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            color: var(--t-main);
            border: 1px solid var(--border);
            transition: 0.4s;
        }

        .button:active .icon-hex {
            background: var(--p);
            border-color: var(--p);
            transform: rotate(-10deg);
        }

        .t1 { display: block; font-weight: 700; font-size: 1.15rem; color: #fff; letter-spacing: -0.5px; }
        .t2 { display: block; font-size: 0.9rem; color: var(--t-sec); margin-top: 3px; }

        /* DESTAQUE IA (SITE OFICIAL) */
        .button.hero {
            background: var(--p);
            border: none;
            box-shadow: 0 25px 50px -15px rgba(0, 53, 255, 0.5);
        }
        .button.hero .t2 { color: rgba(255, 255, 255, 0.7); }
        .button.hero .icon-hex { background: rgba(255, 255, 255, 0.15); border: none; }

        /* === EFEITO REVEAL === */
        .reveal {
            opacity: 0;
            animation: revealEffect 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .rv-1 { animation-delay: 0.2s; }
        .rv-2 { animation-delay: 0.3s; }
        .rv-3 { animation-delay: 0.4s; }
        .rv-4 { animation-delay: 0.5s; }

        @keyframes revealEffect {
            from { opacity: 0; transform: translateY(50px) rotateX(20deg); filter: blur(15px); }
            to { opacity: 1; transform: translateY(0) rotateX(0); filter: blur(0); }
        }

        /* === FOOTER TECH === */
        .footer-tech {
            margin-top: 40px;
            text-align: center;
            display: flex; flex-direction: column; gap: 30px;
        }

        .share-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 12px;
            margin: 0 auto;
        }

        .share-btn:active { background: #fff; color: #000; }

        .social-links { display: flex; justify-content: center; gap: 35px; }
        .social-links a { color: var(--t-sec); transition: 0.4s; }
        .social-links a:active { color: var(--p); transform: scale(1.4); }

        .copyright {
            font-size: 0.7rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="ai-core"></div>

    <div class="container">
        
        <header class="brand reveal rv-1">
            <div class="logo-aura">
                <div class="aura-spin"></div>
                <div class="aura-spin alt"></div>
                <img src="imagens/bittoofc.png" alt="BITTO" class="avatar">
            </div>
            <h1 class="logo-text">BITTO<span>.</span></h1>
            <p style="color: var(--t-sec); font-weight: 500; margin-top: 10px;">Estudo inteligente para universitários.</p>
        </header>

        <nav class="stack">
            
            <a href="pages/login.html" class="button reveal rv-2">
                <div class="button-content">
                    <div class="icon-hex">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                    </div>
                    <div>
                        <span class="t1">Acesse sua conta!</span>
                        <span class="t2">Faça login na plataforma</span>
                    </div>
                </div>
            </a>

            <a href="index.html" class="button hero reveal rv-3">
                <div class="button-content">
                    <div class="icon-hex">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    </div>
                    <div>
                        <span class="t1">Conheça nossas ferramentas</span>
                        <span class="t2">Acesse o Site Oficial</span>
                    </div>
                </div>
            </a>

            <a href="site/parceiro.html" class="button reveal rv-4">
                <div class="button-content">
                    <div class="icon-hex">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    </div>
                    <div>
                        <span class="t1">Embaixadores BITTO</span>
                        <span class="t2">Seja um afiliado e ganhe dinheiro</span>
                    </div>
                </div>
            </a>

        </nav>

        <div class="footer-tech reveal rv-4">
            <button class="share-btn" onclick="share()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Sync Ecosystem
            </button>

            <div class="social-links">
                <a href="https://instagram.com/usebitto"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                <a href="https://tiktok.com/@usebitto"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg></a>
                <a href="https://x.com/usebitto"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>

            <div class="copyright">BITTO TECNOLOGIA © 2026</div>
        </div>

    </div>

    <script>
        function share() {
            if (navigator.share) {
                navigator.share({ title: 'BITTO Ecosystem', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Ecosystem Link Copied!');
            }
        }
    </script>
</body>
</html>
