<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Links Oficiais | BITTO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0035ff;
            --accent: #ccff00;
            --bg: #050506;
            --card-bg: rgba(20, 20, 22, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-sec: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* === ANIMAÇÃO DE FUNDO IMERSIVA === */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 53, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(204, 255, 0, 0.05) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundFlow 10s infinite alternate ease-in-out;
        }

        @keyframes backgroundFlow {
            from { transform: scale(1); opacity: 0.6; }
            to { transform: scale(1.3); opacity: 1; }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* === PERFIL === */
        .profile {
            text-align: center;
            margin-bottom: 48px;
            animation: profileReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes profileReveal {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-wrapper {
            width: 115px; height: 115px;
            margin: 0 auto 24px;
            position: relative;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 40px;
            background: #111;
            padding: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
        }

        .avatar-glow {
            position: absolute; inset: -5px;
            background: var(--primary);
            filter: blur(20px);
            opacity: 0.3;
            border-radius: 40px;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.2; transform: scale(0.95); }
            to { opacity: 0.5; transform: scale(1.05); }
        }

        .logo-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1.5px;
        }
        .logo-title span { color: var(--primary); }

        .bio-text {
            font-size: 0.95rem;
            color: var(--text-sec);
            font-weight: 500;
            margin-top: 8px;
        }

        /* === LINKS LIST === */
        .links-list {
            display: flex; flex-direction: column; gap: 16px;
            width: 100%;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 28px;
            text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .link-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .card-inner { display: flex; align-items: center; gap: 18px; }

        .icon-box {
            width: 52px; height: 52px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text);
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .link-card:active .icon-box {
            background: var(--primary);
            border-color: var(--primary);
        }

        .link-title { 
            display: block;
            color: var(--text);
            font-weight: 700;
            font-size: 1.05rem;
        }
        .link-desc {
            color: var(--text-sec);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        /* Destaque (Site Oficial) */
        .featured {
            background: var(--primary);
            border: none;
            box-shadow: 0 15px 35px rgba(0, 53, 255, 0.3);
        }
        .featured .link-desc { color: rgba(255, 255, 255, 0.7); }
        .featured .icon-box { background: rgba(255, 255, 255, 0.2); border: none; }

        /* === FOOTER ACTIONS === */
        .footer-actions {
            margin-top: 48px;
            display: flex; flex-direction: column; align-items: center; gap: 32px;
        }

        .share-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text);
            display: flex; align-items: center; gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .share-pill:active { background: white; color: black; }

        .socials { display: flex; gap: 28px; }
        .socials a { color: var(--text-sec); transition: 0.3s; }
        .socials a:active { color: var(--accent); transform: scale(1.2); }

        footer {
            font-size: 0.7rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Staggered Animations */
        .stagger {
            opacity: 0;
            animation: slideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .s-1 { animation-delay: 0.2s; }
        .s-2 { animation-delay: 0.3s; }
        .s-3 { animation-delay: 0.4s; }
        .s-4 { animation-delay: 0.5s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <script>
        function share() {
            if (navigator.share) {
                navigator.share({ title: 'Bitto | Conecte-se', url: window.location.href });

                navigator.clipboard.writeText(window.location.href);

        }
