<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitto Focus Workspace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap');

        /* === VARIÁVEIS DE TEMA === */
        :root {
            --bg-color: #faf9f6;
            --text-color: #18181b;
            --text-muted: #71717a;
            --accent: #facc15; /* Amarelo do marca-texto */
            --accent-hover: #eab308;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: #e4e4e7;
            --timer-color: #18181b;
        }

        [data-theme="dark"] {
            --bg-color: #09090b;
            --text-color: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #fde047;
            --accent-hover: #facc15;
            --panel-bg: rgba(24, 24, 27, 0.75);
            --border-color: #27272a;
            --timer-color: #dbeafe; /* Azul claro da foto */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* === NAVEGAÇÃO SUPERIOR === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            z-index: 10;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--text-color); }

        .top-controls {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover { background: var(--border-color); }

        /* === TIMER FULL SCREEN === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .quote {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-style: italic;
            text-align: center;
            max-width: 600px;
        }

        .timer-display {
            font-size: 15vw; /* Responsivo e Gigante */
            font-weight: 800;
            letter-spacing: -5px;
            color: var(--timer-color);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0px 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .timer-modes {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--border-color);
            padding: 5px;
            border-radius: 50px;
        }

        .timer-modes button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .timer-modes button.active {
            background: var(--bg-color);
            color: var(--text-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .controls-main button {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin: 0 10px;
        }

        .controls-main button:hover { opacity: 0.9; transform: scale(1.05); }
        .controls-main .btn-reset { background: transparent; border: 2px solid var(--text-color); color: var(--text-color); }

        /* === PAINEL DE TAREFAS (GAVETA FLUTUANTE) === */
        .task-panel {
            position: fixed;
            top: 20px;
            bottom: 20px;
            right: -500px; /* Escondido por padrão */
            width: 400px;
            min-width: 300px;
            max-width: 80vw;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 100;
            resize: horizontal; /* Permite redimensionar */
            direction: rtl; /* Faz o resize ficar na esquerda */
            overflow: hidden;
        }

        .task-panel.open { right: 20px; }
        .task-content { direction: ltr; display: flex; flex-direction: column; height: 100%; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .panel-header h2 { font-size: 1.2rem; font-weight: 600; }

        .close-btn {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5rem;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input {
            flex: 1; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 12px;
            background: var(--bg-color); color: var(--text-color); font-size: 1rem; outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }
        .input-group button {
            background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: 600; cursor: pointer;
        }

        .task-list { list-style: none; flex: 1; overflow-y: auto; padding-right: 5px; }
        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .task-item {
            display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color);
        }
        .task-item input[type="checkbox"] {
            margin-right: 15px; width: 18px; height: 18px; accent-color: var(--text-color); cursor: pointer;
        }
        .task-item span { flex: 1; font-size: 1rem; color: var(--text-color); transition: all 0.3s; }
        .task-item.completed span { text-decoration: line-through; color: var(--text-muted); }

        .delete-btn {
            background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; opacity: 0; transition: opacity 0.3s;
        }
        .task-item:hover .delete-btn { opacity: 1; }

        .export-btn {
            margin-top: 20px; background: transparent; border: 1px solid var(--border-color); padding: 15px;
            border-radius: 12px; font-weight: 600; color: var(--text-color); cursor: pointer; display: flex; justify-content: center; gap: 8px; transition: all 0.3s;
        }
        .export-btn:hover { background: var(--border-color); }

        /* Flutuante para abrir tarefas */
        .btn-floating-tasks {
            position: fixed; bottom: 30px; right: 30px; background: var(--text-color); color: var(--bg-color);
            border: none; padding: 15px 25px; border-radius: 50px; font-weight: 600; font-size: 1rem;
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; z-index: 50; transition: transform 0.3s;
        }
        .btn-floating-tasks:hover { transform: translateY(-5px); }

        @media (max-width: 768px) {
            .timer-display { font-size: 25vw; }
            .task-panel { width: 90vw; right: -100vw; bottom: 10px; top: 10px; border-radius: 16px; resize: none; }
            .task-panel.open { right: 5vw; }
            .delete-btn { opacity: 1; }
        }
    </style>
</head>
<body data-theme="dark"> <header>
        <a href="https://usebitto.com" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Voltar para Bitto
        </a>
        <div class="top-controls">
            <button class="icon-btn" onclick="toggleTheme()" title="Alternar Tema" id="theme-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <p class="quote">"Os velhos métodos não abrirão novas portas."</p>

        <div class="timer-modes">
            <button id="mode-pomodoro" class="active" onclick="setMode('pomodoro')">Foco</button>
            <button id="mode-short" onclick="setMode('short')">Pausa Curta</button>
            <button id="mode-long" onclick="setMode('long')">Pausa Longa</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls-main">
            <button id="btn-start" onclick="toggleTimer()">Iniciar Foco</button>
            <button class="btn-reset" onclick="resetTimer()">Resetar</button>
        </div>
    </main>

    <button class="btn-floating-tasks" onclick="togglePanel()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Anotações
    </button>

    <aside class="task-panel" id="task-panel">
        <div class="task-content">
            <div class="panel-header">
                <h2>O que fazer hoje?</h2>
                <button class="close-btn" onclick="togglePanel()">&times;</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Nova tarefa..." onkeypress="handleKeyPress(event)">
                <button onclick="addTask()">Add</button>
            </div>

            <ul class="task-list" id="task-list"></ul>

            <button class="export-btn" onclick="exportTasks()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Exportar (.txt)
            </button>
        </div>
    </aside>

    <script>
        // === TEMA CLARO / ESCURO ===
        const body = document.body;
        const themeBtn = document.getElementById('theme-btn');
        
        // Verifica se há preferência salva
        const savedTheme = localStorage.getItem('saas_theme') || 'dark';
        body.setAttribute('data-theme', savedTheme);

        function toggleTheme() {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('saas_theme', newTheme);
        }

        // === TOGGLE DO PAINEL DE TAREFAS ===
        function togglePanel() {
            const panel = document.getElementById('task-panel');
            panel.classList.toggle('open');
        }

        // === LÓGICA DO TIMER ===
        let timer;
        let minutes = 25;
        let seconds = 0;
        let isRunning = false;
        let currentMode = 'pomodoro';

        const times = { pomodoro: 25, short: 5, long: 15 };
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('btn-start');

        function updateDisplay() {
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
            document.title = `${m}:${s} - Bitto Focus`;
        }

        function setMode(mode) {
            clearInterval(timer);
            isRunning = false;
            startBtn.textContent = "Iniciar";
            currentMode = mode;
            minutes = times[mode];
            seconds = 0;
            updateDisplay();

            document.querySelectorAll('.timer-modes button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                startBtn.textContent = "Continuar";
            } else {
                timer = setInterval(() => {
                    if (seconds === 0) {
                        if (minutes === 0) {
                            clearInterval(timer);
                            isRunning = false;
                            startBtn.textContent = "Iniciar";
                            alert("Tempo esgotado! Hora de trocar o foco.");
                            return;
                        }
                        minutes--;
                        seconds = 59;
                    } else {
                        seconds--;
                    }
                    updateDisplay();
                }, 1000);
                startBtn.textContent = "Pausar";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            minutes = times[currentMode];
            seconds = 0;
            startBtn.textContent = "Iniciar";
            updateDisplay();
        }

        // === LÓGICA DAS TAREFAS ===
        let tasks = JSON.parse(localStorage.getItem('saas_tasks')) || [];

        function saveTasks() { localStorage.setItem('saas_tasks', JSON.stringify(tasks)); }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span>${task.text}</span>
                    <button class="delete-btn" title="Excluir" onclick="deleteTask(${index})">&times;</button>
                `;
                list.appendChild(li);
            });
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (text) {
                tasks.push({ text: text, completed: false });
                input.value = '';
                saveTasks();
                renderTasks();
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') addTask(); }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        // === EXPORTAR PARA TXT ===
        function exportTasks() {
            if (tasks.length === 0) return alert("Nenhuma tarefa para exportar!");
            const dataAtual = new Date().toLocaleDateString('pt-BR');
            let txtContent = `=== RELATÓRIO DE FOCO BITTO (${dataAtual}) ===\n\n`;
            txtContent += `Resumo: ${tasks.filter(t => t.completed).length}/${tasks.length} tarefas concluídas.\n\nLista:\n`;
            tasks.forEach(t => txtContent += `${t.completed ? '[x]' : '[ ]'} ${t.text}\n`);

            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([txtContent], { type: "text/plain;charset=utf-8" }));
            a.download = `Relatorio_Bitto_${dataAtual.replace(/\//g, '-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Inicialização
        updateDisplay();
        renderTasks();
    </script>
</body>
</html>
