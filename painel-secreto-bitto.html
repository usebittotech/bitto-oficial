<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage // Bitto Control</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Unbounded:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #fafafa;
        --text-main: #111111;
        --text-muted: #666666;
        --card-bg: #ffffff;
        --border-color: #e0e0e0;
        --input-bg: #f8f9fa;
        --primary-blue: #0035ff;
        --accent-green: #ccff00;
        --font-display: "Unbounded", sans-serif;
        --font-body: "DM Sans", sans-serif;
      }

      [data-theme="dark"] {
        --bg-color: #050505;
        --text-main: #ededed;
        --text-muted: #aaaaaa;
        --card-bg: #111111;
        --border-color: #333333;
        --input-bg: #1a1a1a;
        --primary-blue: #3366ff;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: var(--font-body);
        margin: 0;
        min-height: 100vh;
        display: none; /* Controlado pelo admin.js */
        -webkit-font-smoothing: antialiased;
        background-image: radial-gradient(
          circle at 50% 50%,
          rgba(0, 53, 255, 0.04) 0%,
          transparent 70%
        );
        padding: 40px 20px;
      }

      .admin-wrapper {
        max-width: 1300px;
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .logo {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 1.2rem;
        letter-spacing: -0.04em;
      }
      .logo span {
        color: var(--primary-blue);
      }

      /* GRID SYSTEM */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 24px;
        align-items: start;
      }

      .auth-card-style {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 24px;
        display: block;
      }

      .auth-input {
        width: 100%;
        background: var(--input-bg);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.9rem;
        outline: none;
        margin-bottom: 12px;
        box-sizing: border-box;
      }

      .btn-primary {
        width: 100%;
        padding: 14px;
        border-radius: 50px;
        border: none;
        font-weight: 800;
        font-family: var(--font-display);
        font-size: 0.8rem;
        cursor: pointer;
        transition: 0.3s;
        background: var(--primary-blue);
        color: white;
      }

      .btn-green {
        background: var(--accent-green);
        color: #111;
      }

      /* TABLE ALIGNMENT FIX */
      .table-container {
        width: 100%;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th {
        text-align: left;
        padding: 15px;
        font-size: 0.65rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        border-bottom: 1px solid var(--border-color);
      }

      td {
        padding: 16px 15px;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.85rem;
        vertical-align: middle;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Column Widths */
      .col-influencer {
        width: 30%;
      }
      .col-status {
        width: 20%;
      }
      .col-assets {
        width: 25%;
      }
      .col-plan {
        width: 10%;
        text-align: center;
      }
      .col-manage {
        width: 15%;
        text-align: right;
      }

      .active-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-green);
        box-shadow: 0 0 10px var(--accent-green);
        display: inline-block;
      }

      #themeBtn {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 8px 16px;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.7rem;
        color: var(--text-main);
      }

      #toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--card-bg);
        color: var(--text-main);
        padding: 15px 30px;
        border-radius: 16px;
        font-weight: 700;
        border-left: 6px solid var(--primary-blue);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        transform: translateY(150px);
        transition: 0.4s;
        z-index: 1000;
      }
      #toast.show {
        transform: translateY(0);
      }

      .btn-delete {
        color: #ff3b3b;
        background: none;
        border: none;
        cursor: pointer;
        opacity: 0.4;
        font-size: 1rem;
      }
      .btn-delete:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="admin-wrapper">
      <header>
        <div class="logo">BACK<span>STAGE</span></div>
        <button id="themeBtn">SWITCH THEME</button>
      </header>

      <div class="dashboard-grid">
        <div class="sidebar">
          <div class="auth-card-style" style="margin-bottom: 24px">
            <span class="section-title">Ativação Firebase</span>
            <input
              type="email"
              id="userEmail"
              class="auth-input"
              placeholder="E-mail do embaixador"
            />
            <button id="btnLiberar" class="btn-primary">GRANT ACCESS</button>
          </div>

          <div class="auth-card-style">
            <span class="section-title">Captura de Lead</span>
            <input
              type="text"
              id="infNome"
              class="auth-input"
              placeholder="Nome Real"
            />
            <input
              type="text"
              id="infInsta"
              class="auth-input"
              placeholder="@usuario"
            />
            <select id="infStatus" class="auth-input">
              <option value="Prospecção">Prospecção</option>
              <option value="Abordagem">Abordagem</option>
              <option value="Ativo">Ativo</option>
            </select>
            <button id="btnSalvarInf" class="btn-primary btn-green">
              SAVE LEAD
            </button>
          </div>
        </div>

        <div class="auth-card-style">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 20px;
            "
          >
            <span class="section-title" style="margin: 0"
              >Pipeline Database</span
            >
            <button
              id="btnSync"
              style="
                background: none;
                border: none;
                color: var(--primary-blue);
                font-weight: 800;
                font-size: 0.7rem;
                cursor: pointer;
              "
            >
              RE-SYNC SHEETS
            </button>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th class="col-influencer">Influencer</th>
                  <th class="col-status">Status</th>
                  <th class="col-assets">Assets (Cupom)</th>
                  <th class="col-plan" style="text-align: center">Plano</th>
                  <th class="col-manage" style="text-align: right">Gerir</th>
                </tr>
              </thead>
              <tbody id="listaInfluencers"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div id="toast">Ação concluída com sucesso</div>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
