<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage | Bitto Management</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --tw-bg-opacity: 1;
        --bitto-blue: #0035ff;
        /* Gradiente Hero enviado */
        --hero-gradient:
          radial-gradient(
            246.6% 88.54% at 37.12% 5.43%,
            hsla(0, 0%, 100%, 0) 56.43%,
            #c2fa11 80.92%,
            #33bd19 100%
          ),
          #fff;
        --text-dark: rgb(36, 76, 78);
      }

      [data-theme="dark"] {
        --hero-gradient: radial-gradient(
          circle at 0% 0%,
          #0b0e14 0%,
          #161b22 100%
        );
        --text-dark: #f0f6fc;
      }

      body {
        margin: 0;
        font-family: "Inter Tight", sans-serif;
        background: var(--hero-gradient);
        background-attachment: fixed;
        color: var(--text-dark);
        min-height: 100vh;
        display: none; /* Controlado pelo Auth */
      }

      /* Classes do Layout Enviado */
      .py-16 {
        padding-top: 4rem;
        padding-bottom: 4rem;
      }
      .px-6 {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      .grid {
        display: grid;
      }
      .bg-white {
        background-color: rgb(255 255 255 / var(--tw-bg-opacity));
      }

      /* Glass Card adaptado ao novo layout */
      .card-container {
        border: 1px solid #7c7c8a;
        border-radius: 1rem;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease;
      }

      [data-theme="dark"] .card-container {
        background: rgba(15, 20, 30, 0.8);
        border-color: rgba(255, 255, 255, 0.1);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .btn-action {
        background: var(--bitto-blue);
        color: white;
        padding: 12px 24px;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
      }

      .btn-action:hover {
        opacity: 0.9;
        transform: scale(0.98);
      }

      /* Custom Scrollbar conforme solicitado */
      * {
        scrollbar-color: color-mix(in oklch, currentColor 35%, transparent)
          transparent;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 8px;
      }
      th {
        text-align: left;
        padding: 12px;
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      td {
        padding: 16px;
        background: rgba(255, 255, 255, 0.5);
        border-top: 1px solid rgba(0, 0, 0, 0.05);
      }
      [data-theme="dark"] td {
        background: rgba(255, 255, 255, 0.02);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      #toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        background: #111;
        color: white;
        font-weight: 600;
        transform: translateY(200%);
        transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      #toast.show {
        transform: translateY(0);
      }
    </style>
  </head>
  <body data-theme="light">
    <header class="bg-white">
      <div style="font-weight: 800; font-size: 1.2rem">
        BACKSTAGE <span style="color: #33bd19">●</span>
      </div>
      <button
        id="themeBtn"
        style="
          background: none;
          border: 1px solid #7c7c8a;
          padding: 5px 15px;
          border-radius: 20px;
          cursor: pointer;
          font-size: 0.7rem;
          font-weight: 700;
        "
      >
        SWITCH THEME
      </button>
    </header>

    <main class="container px-6 py-16">
      <div class="grid" style="grid-template-columns: 1fr 2fr; gap: 2rem">
        <div data-aos="fade-up" data-aos-duration="700">
          <div class="card-container">
            <h2
              style="
                font-size: 0.8rem;
                margin-bottom: 1.5rem;
                color: var(--text-dark);
              "
            >
              FIREBASE ACTIVATION
            </h2>
            <input
              type="email"
              id="userEmail"
              placeholder="student@email.com"
              style="
                width: 100%;
                padding: 12px;
                border: 1px solid #7c7c8a;
                border-radius: 8px;
                margin-bottom: 1rem;
                background: transparent;
              "
            />
            <button id="btnLiberar" class="btn-action" style="width: 100%">
              GRANT 90 DAYS
            </button>
          </div>

          <div class="card-container" style="margin-top: 1.5rem">
            <h2 style="font-size: 0.8rem; margin-bottom: 1.5rem">
              QUICK ADD LEAD
            </h2>
            <input
              type="text"
              id="infNome"
              placeholder="Name"
              style="
                width: 100%;
                padding: 10px;
                border: 1px solid #7c7c8a;
                border-radius: 8px;
                margin-bottom: 0.5rem;
                background: transparent;
              "
            />
            <input
              type="text"
              id="infInsta"
              placeholder="@insta"
              style="
                width: 100%;
                padding: 10px;
                border: 1px solid #7c7c8a;
                border-radius: 8px;
                margin-bottom: 1rem;
                background: transparent;
              "
            />
            <button
              id="btnSalvarInf"
              class="btn-action"
              style="width: 100%; background: #111"
            >
              ADD TO CRM
            </button>
          </div>
        </div>

        <div data-aos="fade-up" data-aos-delay="100" data-aos-duration="700">
          <div class="card-container">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
              "
            >
              <h2 style="font-size: 0.8rem; margin: 0">PARTNERSHIP PIPELINE</h2>
              <button
                id="btnSync"
                style="
                  background: #33bd19;
                  border: none;
                  padding: 8px 16px;
                  border-radius: 8px;
                  font-weight: 700;
                  font-size: 10px;
                  cursor: pointer;
                "
              >
                REFRESH DATABASE
              </button>
            </div>

            <div style="overflow-x: auto">
              <table>
                <thead>
                  <tr>
                    <th>Identity</th>
                    <th>Status</th>
                    <th>Asset</th>
                    <th style="text-align: center">Plan</th>
                    <th style="text-align: right">Manage</th>
                  </tr>
                </thead>
                <tbody id="listaInfluencers"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="toast">ACTION SUCCESSFUL</div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
