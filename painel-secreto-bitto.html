<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Bitto | CRM & Ativação</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #fafafa;
        --blue: #0035ff;
        --green: #ccff00;
        --text: #111;
        --card: #ffffff;
        --border: #e8e8e8;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--bg);
        background-image: radial-gradient(var(--blue) 0.5px, transparent 0.5px);
        background-size: 30px 30px;
        display: none;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
      }

      .grid-top {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 25px;
        margin-bottom: 40px;
      }

      .card {
        background: var(--card);
        padding: 25px;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
      }

      .card-title {
        font-family: "Unbounded", sans-serif;
        font-size: 14px;
        margin-bottom: 20px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--blue);
        display: block;
        margin-bottom: 8px;
      }

      input,
      select {
        width: 100%;
        padding: 14px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        outline: none;
        margin-bottom: 15px;
        box-sizing: border-box;
        transition: 0.2s;
      }
      input:focus {
        border-color: var(--blue);
        background: #fff;
      }

      button {
        width: 100%;
        padding: 16px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        font-family: "Unbounded", sans-serif;
        font-size: 11px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 53, 255, 0.2);
      }

      /* Tabela CRM */
      .table-container {
        background: white;
        border-radius: 24px;
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .table-header {
        padding: 20px 30px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #fcfcfc;
        padding: 18px 25px;
        text-align: left;
        font-size: 10px;
        text-transform: uppercase;
        color: #999;
        letter-spacing: 1px;
      }
      td {
        padding: 20px 25px;
        border-bottom: 1px solid #f9f9f9;
        vertical-align: middle;
        font-size: 14px;
      }

      .copy-badge {
        cursor: pointer;
        font-size: 9px;
        background: #eee;
        padding: 3px 8px;
        border-radius: 5px;
        margin-left: 5px;
        transition: 0.2s;
        color: #666;
        font-weight: bold;
      }
      .copy-badge:hover {
        background: var(--blue);
        color: white;
      }

      .progress-bar {
        width: 80px;
        height: 6px;
        background: #eee;
        border-radius: 10px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--blue);
        transition: 0.5s;
      }

      #toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 15px 30px;
        background: var(--text);
        color: white;
        border-radius: 15px;
        font-family: "Unbounded";
        font-size: 11px;
        transform: translateY(150px);
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 9999;
      }
      #toast.show {
        transform: translateY(0);
      }

      .loading-shimmer {
        background: linear-gradient(
          90deg,
          #f9f9f9 25%,
          #efefef 50%,
          #f9f9f9 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="grid-top">
        <div class="card">
          <div class="card-title">🚀 Ativar Plano</div>
          <label>E-mail do Embaixador</label>
          <input
            type="email"
            id="userEmail"
            placeholder="usuario@exemplo.com"
          />
          <button id="btnLiberar">LIBERAR 90 DIAS</button>
        </div>

        <div class="card">
          <div class="card-title">➕ Novo Influencer</div>
          <div
            style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px"
          >
            <div>
              <label>Nome/E-mail</label
              ><input type="text" id="infNome" placeholder="Identificação" />
            </div>
            <div>
              <label>Instagram</label
              ><input type="text" id="infInsta" placeholder="@user" />
            </div>
            <div>
              <label>Status Inicial</label>
              <select id="infStatus">
                <option value="Prospecção">Prospecção</option>
                <option value="Abordagem">Abordagem</option>
                <option value="Negociação">Negociação</option>
              </select>
            </div>
          </div>
          <button id="btnSalvarInf" style="background: var(--text)">
            ADICIONAR AO CRM
          </button>
        </div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h3
            style="
              margin: 0;
              font-family: &quot;Unbounded&quot;;
              font-size: 15px;
            "
          >
            Pipeline de Embaixadores
          </h3>
          <button
            id="btnSync"
            style="
              width: auto;
              padding: 10px 25px;
              background: var(--green);
              color: #000;
            "
          >
            🔄 Sincronizar Sheets
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Influencer</th>
              <th>Status</th>
              <th>Interações (DM)</th>
              <th>Link / Cupom</th>
              <th style="text-align: center">Plano</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="listaInfluencers"></tbody>
        </table>
      </div>
    </div>

    <div id="toast">Ação realizada!</div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
