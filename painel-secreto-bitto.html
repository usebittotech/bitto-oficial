<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage // Bitto Workspace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --text: #37352f;
        --text-muted: #73726e;
        --border: rgba(55, 53, 47, 0.1);
        --hover: #f1f1f0;
        --bitto-blue: #0035ff;
        --bitto-green: #ccff00;
      }

      [data-theme="dark"] {
        --bg: #191919;
        --text: #d4d4d4;
        --text-muted: #9b9b9b;
        --border: rgba(255, 255, 255, 0.1);
        --hover: #2f2f2f;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        margin: 0;
        display: none; /* Controlado pelo admin.js */
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 60px 40px;
      }

      .header-title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 30px;
        letter-spacing: -1px;
      }

      .section-block {
        margin-top: 30px;
        border-top: 1px solid var(--border);
        padding-top: 20px;
      }
      .section-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 15px;
      }

      .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      input,
      select {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 12px;
        font-size: 14px;
        color: var(--text);
        outline: none;
      }

      .btn-action {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-action:hover {
        background: var(--hover);
      }

      /* Tabela Estilo Notion */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th {
        text-align: left;
        font-size: 11px;
        color: var(--text-muted);
        padding: 10px;
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
      }
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        vertical-align: middle;
      }

      .progress-bar {
        width: 60px;
        height: 5px;
        background: var(--hover);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 5px;
      }
      .progress-fill {
        height: 100%;
        background: var(--bitto-blue);
        transition: 0.5s;
      }

      #themeBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 11px;
        border: 1px solid var(--border);
        background: none;
        color: var(--text-muted);
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 4px;
      }
      #toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--text);
        color: var(--bg);
        padding: 10px 20px;
        border-radius: 6px;
        display: none;
        z-index: 10000;
      }
    </style>
  </head>
  <body data-theme="light">
    <button id="themeBtn">Alternar Tema</button>

    <div class="container">
      <h1 class="header-title">⚙️ Backstage</h1>

      <div class="section-block">
        <div class="section-label">Ativação Firebase</div>
        <div class="input-group">
          <input
            type="email"
            id="userEmail"
            placeholder="E-mail do embaixador..."
            style="flex: 1"
          />
          <button
            id="btnLiberar"
            class="btn-action"
            style="color: var(--bitto-blue)"
          >
            Liberar 90 dias
          </button>
        </div>
      </div>

      <div class="section-block">
        <div class="section-label">Novo Lead (Sheets)</div>
        <div class="input-group">
          <input
            type="text"
            id="infNome"
            placeholder="Nome"
            style="width: 200px"
          />
          <input
            type="text"
            id="infInsta"
            placeholder="@instagram"
            style="width: 150px"
          />
          <select id="infStatus" style="width: 150px">
            <option value="Prospecção">Prospecção</option>
            <option value="Abordagem">Abordagem</option>
            <option value="Negociação">Negociação</option>
          </select>
          <button id="btnSalvarInf" class="btn-action">Adicionar Lead</button>
        </div>
      </div>

      <div class="section-block">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
          "
        >
          <div class="section-label">Pipeline Database</div>
          <button id="btnSync" class="btn-action" style="font-size: 11px">
            ↻ Sync Sheets
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Influencer</th>
              <th>Status</th>
              <th>Interações (DM)</th>
              <th>Link / Cupom</th>
              <th style="text-align: center">Plano</th>
              <th style="text-align: right">Ação</th>
            </tr>
          </thead>
          <tbody id="listaInfluencers"></tbody>
        </table>
      </div>
    </div>

    <div id="toast">Ação realizada</div>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
