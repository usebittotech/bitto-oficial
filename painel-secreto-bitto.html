<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Bitto | CRM Embaixadores</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #fafafa;
        --blue: #0035ff;
        --green: #ccff00;
        --text: #111;
        --card: #ffffff;
        --border: #e0e0e0;
        --success: #00b884;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--bg);
        background-image: radial-gradient(var(--blue) 0.5px, transparent 0.5px);
        background-size: 30px 30px;
        display: none; /* Controlado pelo JS */
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 1100px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }
      h1 {
        font-family: "Unbounded", sans-serif;
        font-size: 28px;
        margin-bottom: 5px;
      }

      .grid-top {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        background: var(--card);
        padding: 30px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border);
      }

      .input-group {
        text-align: left;
        margin-bottom: 15px;
      }
      label {
        font-weight: bold;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--blue);
        display: block;
        margin-bottom: 5px;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        outline: none;
      }

      button {
        width: 100%;
        padding: 14px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        font-family: "Unbounded", sans-serif;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: scale(1.02);
        filter: brightness(1.2);
      }

      /* Tabela de CRM */
      .table-container {
        overflow-x: auto;
        background: white;
        border-radius: 24px;
        border: 1px solid var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        background: #f8f9fa;
        padding: 15px;
        text-align: left;
        border-bottom: 2px solid var(--border);
        color: var(--blue);
      }
      td {
        padding: 15px;
        border-bottom: 1px solid #eee;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 10px;
        text-transform: uppercase;
      }
      .status-prospeccao {
        background: #eee;
      }
      .status-contato {
        background: #fff3cd;
        color: #856404;
      }
      .status-ativo {
        background: #d4edda;
        color: #155724;
      }

      #btnSync {
        background: var(--green);
        color: black;
        margin-bottom: 10px;
        width: auto;
        padding: 10px 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Admin Bitto</h1>
        <p>Gestão de Influenciadores & Ativação de Planos</p>
      </div>

      <div class="grid-top">
        <div class="card">
          <label
            style="
              color: var(--text);
              font-family: &quot;Unbounded&quot;;
              font-size: 14px;
              margin-bottom: 15px;
            "
            >🚀 Ativar Plano Embaixador</label
          >
          <div class="input-group">
            <input
              type="email"
              id="userEmail"
              placeholder="E-mail do usuário"
            />
          </div>
          <button id="btnLiberar">ATIVAR 90 DIAS</button>
          <p id="statusMsg" style="font-size: 12px; margin-top: 10px"></p>
        </div>

        <div class="card">
          <label
            style="
              color: var(--text);
              font-family: &quot;Unbounded&quot;;
              font-size: 14px;
              margin-bottom: 15px;
            "
            >➕ Novo Influencer (CRM)</label
          >
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
            <input type="text" id="infNome" placeholder="Nome" />
            <input type="text" id="infInsta" placeholder="@Instagram" />
            <input
              type="text"
              id="infNicho"
              placeholder="Nicho (Ex: Estudos)"
            />
            <select id="infStatus">
              <option value="Prospecção">Fase 1: Prospecção</option>
              <option value="Contato">Fase 2: Abordagem</option>
              <option value="Negociação">Fase 3: Negociação</option>
              <option value="Ativo">Fase 4: Ativo</option>
            </select>
          </div>
          <button id="btnSalvarInf" style="margin-top: 15px; background: #111">
            SALVAR NA PLANILHA
          </button>
        </div>
      </div>

      <div class="table-container">
        <div
          style="
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h3
            style="
              margin: 0;
              font-family: &quot;Unbounded&quot;;
              font-size: 16px;
            "
          >
            Influenciadores Mapeados
          </h3>
          <button id="btnSync">Sincronizar Google Sheets</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Influencer</th>
              <th>Nicho</th>
              <th>Status</th>
              <th>Interações (DMs)</th>
              <th>Plano</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="listaInfluencers"></tbody>
        </table>
      </div>

      <a
        href="index.html"
        style="
          display: block;
          text-align: center;
          margin-top: 30px;
          font-size: 12px;
          color: #999;
          text-decoration: none;
        "
        >Sair do Painel</a
      >
    </div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
