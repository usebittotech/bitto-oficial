<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage // Bitto Control</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fustat:wght@300;500;800&family=Inter+Tight:wght@400;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bitto-blue: #0035ff;
        --bitto-green: #c2fa11;
        --bg-dark: #050505;
        --card-bg: rgba(18, 18, 18, 0.8);
        --border-color: rgba(124, 124, 138, 0.2);
        --hero-grad: radial-gradient(
          246.6% 88.54% at 37.12% 5.43%,
          hsla(0, 0%, 100%, 0.05) 56.43%,
          #c2fa11 80.92%,
          #33bd19 100%
        );
      }

      body {
        background-color: var(--bg-dark);
        background-image: var(--hero-grad);
        background-attachment: fixed;
        color: #fff;
        font-family: "Inter Tight", sans-serif;
        margin: 0;
        overflow-x: hidden;
        display: none; /* Auth check */
      }

      /* Dashboard HUD Layout */
      .hud-container {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 20px;
        padding: 30px;
        max-width: 1600px;
        margin: 0 auto;
      }

      .glass-panel {
        background: var(--card-bg);
        backdrop-filter: blur(25px);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 25px;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .glass-panel:hover {
        border-color: var(--bitto-green);
        box-shadow: 0 0 30px rgba(194, 250, 17, 0.1);
      }

      /* Typography */
      h1,
      h2 {
        font-family: "Fustat", sans-serif;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .label-neon {
        font-size: 0.65rem;
        color: var(--bitto-green);
        font-weight: 800;
        margin-bottom: 10px;
        display: block;
      }

      /* Inputs Estilizados */
      input,
      select {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        padding: 15px;
        border-radius: 12px;
        color: #fff;
        font-size: 0.9rem;
        margin-bottom: 20px;
        outline: none;
      }

      input:focus {
        border-color: var(--bitto-blue);
        background: rgba(0, 53, 255, 0.05);
      }

      /* Custom Scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--bitto-green) transparent;
      }

      /* Status Grid (Substituindo a Tabela) */
      .pipeline-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 15px;
      }

      .lead-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 15px;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }

      .lead-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--bitto-blue);
      }

      .btn-neon {
        background: var(--bitto-green);
        color: #000;
        border: none;
        padding: 12px 25px;
        border-radius: 50px;
        font-weight: 900;
        font-family: "Fustat", sans-serif;
        cursor: pointer;
        transition: 0.3s;
        width: 100%;
      }

      .btn-neon:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px var(--bitto-green);
      }

      .delete-icon {
        position: absolute;
        top: 15px;
        right: 15px;
        color: #ff4b4b;
        cursor: pointer;
        opacity: 0.4;
        transition: 0.3s;
      }

      .delete-icon:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body
    data-aos-easing="ease-out-cubic"
    data-aos-duration="700"
    data-aos-delay="0"
  >
    <header
      style="
        padding: 20px 40px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      "
    >
      <div
        style="
          font-family: &quot;Fustat&quot;;
          font-weight: 800;
          font-size: 1.4rem;
        "
      >
        BACKSTAGE<span style="color: var(--bitto-green)">.SYS</span>
      </div>
      <div style="font-size: 0.7rem; opacity: 0.5">
        AUTH_LEVEL: FOUNDER // STATUS: ONLINE
      </div>
    </header>

    <main class="hud-container">
      <aside>
        <div class="glass-panel" data-aos="fade-right">
          <span class="label-neon">// ACCOUNT ACTIVATION</span>
          <input type="email" id="userEmail" placeholder="ENTER USER EMAIL" />
          <button id="btnLiberar" class="btn-neon">EXECUTE GRANT_ACCESS</button>
        </div>

        <div
          class="glass-panel"
          style="margin-top: 20px"
          data-aos="fade-right"
          data-aos-delay="100"
        >
          <span class="label-neon">// CAPTURE NEW LEAD</span>
          <input type="text" id="infNome" placeholder="NAME / IDENTIFIER" />
          <input type="text" id="infInsta" placeholder="@INSTAGRAM_HANDLE" />
          <button id="btnSalvarInf" class="btn-neon" style="background: #fff">
            PUSH TO DATABASE
          </button>
        </div>
      </aside>

      <section class="glass-panel" data-aos="fade-up">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
          "
        >
          <h2 style="margin: 0; font-size: 1rem">PARTNERSHIP PIPELINE</h2>
          <button
            id="btnSync"
            style="
              background: transparent;
              border: 1px solid var(--bitto-green);
              color: var(--bitto-green);
              padding: 5px 15px;
              border-radius: 5px;
              cursor: pointer;
            "
          >
            REFRESH_CORE
          </button>
        </div>

        <div id="listaInfluencers" class="pipeline-grid"></div>
      </section>
    </main>

    <div
      id="toast"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 15px 30px;
        border-left: 5px solid var(--bitto-green);
        background: #111;
        display: none;
      "
    >
      DATABASE UPDATED
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
