<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage | Bitto HQ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bitto-blue: #0035ff;
        --bitto-green: #ccff00;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.4);
        --bg-gradient: radial-gradient(
          circle at 0% 0%,
          #f0f2f5 0%,
          #d9e2ec 100%
        );
        --text-main: #1a1d21;
        --text-muted: #64748b;
      }

      [data-theme="dark"] {
        --glass-bg: rgba(15, 20, 30, 0.8);
        --glass-border: rgba(255, 255, 255, 0.05);
        --bg-gradient: radial-gradient(
          circle at 0% 0%,
          #0b0e14 0%,
          #161b22 100%
        );
        --text-main: #f0f6fc;
        --text-muted: #8b949e;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--text-main);
        margin: 0;
        min-height: 100vh;
        display: none; /* Controlado pelo Auth */
        transition: all 0.5s ease;
      }

      /* Glassmorphism Effect */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
      }

      header {
        padding: 1rem 3rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .logo {
        font-family: "Unbounded", sans-serif;
        font-size: 1.3rem;
      }
      .logo span {
        background: linear-gradient(
          90deg,
          var(--bitto-blue),
          var(--bitto-green)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Grid & Cards */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        padding: 25px;
        transition: transform 0.3s ease;
      }
      .card:hover {
        transform: translateY(-5px);
        border-color: var(--bitto-blue);
      }

      .card-title {
        font-family: "Unbounded", sans-serif;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Inputs & Buttons */
      input,
      select {
        width: 100%;
        padding: 12px 15px;
        background: rgba(0, 0, 0, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: var(--text-main);
        margin-bottom: 15px;
        outline: none;
      }

      [data-theme="dark"] input {
        background: rgba(255, 255, 255, 0.05);
      }

      .btn-grad {
        background: linear-gradient(135deg, var(--bitto-blue) 0%, #0022aa 100%);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 53, 255, 0.3);
      }

      /* CRM Table */
      .table-glass {
        overflow: hidden;
        margin-top: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        padding: 15px 25px;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      td {
        padding: 20px 25px;
        border-top: 1px solid var(--glass-border);
      }

      /* Status Pills */
      .badge {
        padding: 5px 12px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 700;
        background: var(--bitto-blue);
        color: white;
      }

      .progress-bar {
        width: 100px;
        height: 6px;
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--bitto-blue),
          var(--bitto-green)
        );
      }

      .theme-toggle {
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.7rem;
        border: none;
        background: var(--text-main);
        color: var(--bg-gradient);
      }
    </style>
  </head>
  <body data-theme="dark">
    <header class="glass" style="margin: 20px 40px; border-radius: 50px">
      <div class="logo">BACK<span>STAGE</span></div>
      <div style="display: flex; gap: 20px; align-items: center">
        <button class="theme-toggle" id="themeBtn">SWITCH THEME</button>
        <span
          style="font-weight: 800; font-size: 0.7rem; color: var(--bitto-green)"
          >● FOUNDER</span
        >
      </div>
    </header>

    <div class="container">
      <div class="dashboard-grid">
        <div class="card glass">
          <div class="card-title">
            <span style="color: var(--bitto-blue)">⚡</span> Ativação Rápida
          </div>
          <input type="email" id="userEmail" placeholder="e-mail do aluno..." />
          <button id="btnLiberar" class="btn-grad" style="width: 100%">
            LIBERAR 90 DIAS
          </button>
        </div>

        <div class="card glass">
          <div class="card-title">
            <span style="color: var(--bitto-green)">🚀</span> Novo Embaixador
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <input type="text" id="infNome" placeholder="Nome" />
            <input type="text" id="infInsta" placeholder="@instagram" />
          </div>
          <select id="infStatus">
            <option>Prospecção</option>
            <option>Abordagem</option>
            <option>Negociação</option>
          </select>
          <button
            id="btnSalvarInf"
            class="btn-grad"
            style="background: var(--text-main); width: 100%"
          >
            ADICIONAR AO CRM
          </button>
        </div>
      </div>

      <div class="table-glass glass">
        <div
          style="
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h3
            style="
              margin: 0;
              font-family: &quot;Unbounded&quot;;
              font-size: 0.8rem;
            "
          >
            Pipeline Management
          </h3>
          <button
            id="btnSync"
            style="
              background: var(--bitto-green);
              color: #000;
              border: none;
              padding: 10px 20px;
              border-radius: 10px;
              font-weight: 800;
              font-size: 0.65rem;
              cursor: pointer;
            "
          >
            SYNC DATABASE
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Identidade</th>
              <th>Funil</th>
              <th>Engagement</th>
              <th>Assets</th>
              <th>Status</th>
              <th style="text-align: right">Ações</th>
            </tr>
          </thead>
          <tbody id="listaInfluencers"></tbody>
        </table>
      </div>
    </div>

    <div
      id="toast"
      style="
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 15px 25px;
        border-radius: 15px;
        display: none;
      "
      class="glass"
    >
      Notificação
    </div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
