<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Backstage // BITTO Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #0035ff;
        --accent: #ccff00;
        --bg: #000000;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --text-sec: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100dvh;
        display: none; /* Controlado pelo Auth no admin.js */
        justify-content: center;
        overflow-x: hidden;
        position: relative;
      }

      /* === IA NEBULA BACKGROUND (Do seu arquivo bio.html) === */
      .nebula {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background:
          radial-gradient(
            circle at 50% -20%,
            rgba(0, 53, 255, 0.25) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 0% 100%,
            rgba(0, 53, 255, 0.05) 0%,
            transparent 40%
          );
      }

      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.05) 1px,
          transparent 1px
        );
        background-size: 32px 32px;
        z-index: -1;
        mask-image: radial-gradient(circle at center, black, transparent 80%);
      }

      .container {
        width: 100%;
        max-width: 1100px;
        padding: 60px 24px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      /* === HEADER === */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }

      .logo-text {
        font-family: "Outfit", sans-serif;
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -1.5px;
        background: linear-gradient(to bottom, #fff 60%, var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* === DASHBOARD GRID === */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 24px;
      }

      .glass-card {
        background: var(--glass);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        padding: 28px;
        border-radius: 32px;
        border: 1px solid var(--border);
        transition: border-color 0.3s ease;
      }

      .glass-card:focus-within {
        border-color: var(--primary);
      }

      .section-title {
        font-family: "Outfit", sans-serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--accent);
        margin-bottom: 20px;
        display: block;
      }

      /* === FORMS & INPUTS === */
      input,
      select {
        width: 100%;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 18px;
        color: white;
        font-size: 0.95rem;
        margin-bottom: 16px;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--primary);
      }

      button {
        width: 100%;
        padding: 16px;
        border-radius: 18px;
        border: none;
        font-weight: 700;
        font-family: "Inter", sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 15px 30px -10px rgba(0, 53, 255, 0.4);
      }

      .btn-primary:active {
        transform: scale(0.97);
      }

      .btn-sec {
        background: white;
        color: black;
      }

      /* === CRM TABLE STYLE === */
      .table-wrapper {
        width: 100%;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        padding: 16px;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--text-sec);
        letter-spacing: 1px;
        border-bottom: 1px solid var(--border);
      }

      td {
        padding: 20px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
        vertical-align: middle;
      }

      .tr-lead:hover {
        background: rgba(255, 255, 255, 0.01);
      }

      .progress-container {
        width: 60px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 6px;
      }
      .progress-fill {
        height: 100%;
        background: var(--primary);
        transition: 0.5s;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
      }

      .btn-delete {
        background: none;
        border: none;
        color: #ff4b4b;
        cursor: pointer;
        font-size: 1.2rem;
        opacity: 0.3;
        transition: 0.3s;
      }
      .btn-delete:hover {
        opacity: 1;
        transform: scale(1.2);
      }

      /* === TOAST === */
      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        color: black;
        padding: 12px 28px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.85rem;
        display: none;
        z-index: 1000;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      @media (max-width: 900px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="nebula"></div>
    <div class="particles"></div>

    <div class="container">
      <header>
        <h1 class="logo-text">BACKSTAGE<span>.</span></h1>
        <div style="text-align: right">
          <p
            style="
              font-size: 0.65rem;
              font-weight: 800;
              color: var(--accent);
              letter-spacing: 2px;
            "
          >
            STATUS: ENCRYPTED
          </p>
          <p style="font-size: 0.75rem; color: var(--text-sec)">
            Founder Control Panel
          </p>
        </div>
      </header>

      <div class="dashboard-grid">
        <div class="glass-card">
          <span class="support-title section-title">Ativação de Aluno</span>
          <input
            type="email"
            id="userEmail"
            placeholder="ID do Aluno (E-mail)"
          />
          <button id="btnLiberar" class="btn-primary">LIBERAR 90 DIAS</button>
        </div>

        <div class="glass-card">
          <span class="support-title section-title">Pipeline Lead Capture</span>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
            <input type="text" id="infNome" placeholder="Nome Real" />
            <input type="text" id="infInsta" placeholder="@username" />
          </div>
          <button id="btnSalvarInf" class="btn-sec">
            PUSH TO CLOUD DATABASE
          </button>
        </div>
      </div>

      <div class="glass-card" style="padding: 0; overflow: hidden">
        <div
          style="
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
          "
        >
          <span class="section-title" style="margin: 0"
            >Partnership Database</span
          >
          <button
            id="btnSync"
            style="
              width: auto;
              padding: 8px 16px;
              background: var(--glass);
              color: var(--text);
              border: 1px solid var(--border);
              border-radius: 12px;
              font-size: 0.7rem;
            "
          >
            REFRESH DATA
          </button>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Embaixador</th>
                <th>Status Funil</th>
                <th>Engagement</th>
                <th style="text-align: center">Cloud Status</th>
                <th style="text-align: right">Manage</th>
              </tr>
            </thead>
            <tbody id="listaInfluencers"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="toast">SYSTEM UPDATED</div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
