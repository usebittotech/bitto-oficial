<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Bitto | Liberação</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #fafafa;
        --blue: #0035ff;
        --green: #ccff00;
        --text: #111;
        --card: #ffffff;
        --border: #e0e0e0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--bg);
        background-image: radial-gradient(var(--blue) 0.5px, transparent 0.5px);
        background-size: 30px 30px;
        display: none; /* Controlado pelo JS */
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      .card {
        background: var(--card);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      h1 {
        font-family: "Unbounded", sans-serif;
        font-size: 22px;
        margin-bottom: 10px;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
      }
      .input-group {
        text-align: left;
        margin-bottom: 20px;
      }
      label {
        font-weight: bold;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--blue);
        display: block;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 14px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 16px;
        outline: none;
      }
      input:focus {
        border-color: var(--blue);
      }

      button {
        width: 100%;
        padding: 16px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        font-family: "Unbounded", sans-serif;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.02);
        filter: brightness(1.2);
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #statusMsg {
        margin-top: 20px;
        font-size: 14px;
        font-weight: bold;
      }
      .success {
        color: #00b884;
      }
      .error {
        color: #ff3333;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin Bitto</h1>
      <p>Ative 90 dias de plano <b>Embaixador</b> para um usuário.</p>

      <div class="input-group">
        <label>E-mail do Influenciador</label>
        <input type="email" id="userEmail" placeholder="email@exemplo.com" />
      </div>

      <button id="btnLiberar">ATIVAR ACESSO</button>
      <p id="statusMsg"></p>

      <a
        href="index.html"
        style="
          display: block;
          margin-top: 20px;
          font-size: 12px;
          color: #999;
          text-decoration: none;
        "
        >Sair do Painel</a
      >
    </div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
