<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage | Bitto Management</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Light Theme */
        --bg: #f8f9fa;
        --card: #ffffff;
        --sidebar: #ffffff;
        --text-main: #1a1d21;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --input-bg: #f1f5f9;

        /* Bitto Colors */
        --bitto-blue: #0035ff;
        --bitto-green: #ccff00;
        --bitto-green-dark: #b8e600;
        --card-shadow:
          0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      }

      [data-theme="dark"] {
        --bg: #0b0e14;
        --card: #161b22;
        --sidebar: #0d1117;
        --text-main: #f0f6fc;
        --text-muted: #8b949e;
        --border: #30363d;
        --input-bg: #0d1117;
        --card-shadow: 0 0 0 1px #30363d;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        transition: background 0.3s ease;
        display: none; /* Controlado pelo Auth */
      }

      /* Layout Grid */
      header {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-family: "Unbounded", sans-serif;
        font-size: 1.1rem;
        letter-spacing: -1px;
      }
      .logo span {
        color: var(--bitto-blue);
      }

      .container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 2rem;
      }

      /* Modern Dashboard Cards */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 1.5rem;
        box-shadow: var(--card-shadow);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.2rem;
        font-weight: 600;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      /* Forms */
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--text-muted);
        display: block;
        margin-bottom: 6px;
      }

      input,
      select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.85rem;
        background: var(--input-bg);
        color: var(--text-main);
        outline: none;
        transition: border 0.2s;
      }

      input:focus {
        border-color: var(--bitto-blue);
      }

      .btn-primary {
        background: var(--bitto-blue);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }

      /* CRM Table */
      .crm-wrapper {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
        overflow: hidden;
      }

      .table-toolbar {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: var(--bg);
        padding: 12px 1.5rem;
        text-align: left;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 14px 1.5rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }

      /* Progress & Badges */
      .progress-track {
        width: 100%;
        height: 4px;
        background: var(--border);
        border-radius: 10px;
        margin-top: 6px;
      }
      .progress-fill {
        height: 100%;
        background: var(--bitto-blue);
        border-radius: 10px;
        transition: width 0.4s;
      }

      .theme-toggle {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 6px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
      }

      #toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 0.75rem 1.5rem;
        background: var(--bitto-blue);
        color: white;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 500;
        transform: translateY(200%);
        transition: 0.3s;
        z-index: 1000;
      }
      #toast.show {
        transform: translateY(0);
      }
    </style>
  </head>
  <body data-theme="light">
    <header>
      <div class="logo">BACK<span>STAGE</span></div>
      <div style="display: flex; align-items: center; gap: 15px">
        <button class="theme-toggle" id="themeBtn">🌙 MODO DARK</button>
        <div style="width: 1px; height: 20px; background: var(--border)"></div>
        <span
          style="font-size: 0.7rem; font-weight: 700; color: var(--bitto-blue)"
          >FOUNDER MODE</span
        >
      </div>
    </header>

    <div class="container">
      <div class="stats-grid">
        <div class="card">
          <div class="card-header"><span>🚀 Ativação Direta</span></div>
          <div class="form-group">
            <label>E-mail do Usuário</label>
            <input type="email" id="userEmail" placeholder="id@bitto.tech" />
          </div>
          <button id="btnLiberar" class="btn-primary" style="width: 100%">
            LIBERAR ACESSO (90D)
          </button>
        </div>

        <div class="card" style="grid-column: span 2">
          <div class="card-header"><span>➕ Captura de Lead</span></div>
          <div
            style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 1rem;
            "
          >
            <div class="form-group">
              <label>Nome do Talento</label>
              <input type="text" id="infNome" placeholder="Nome Completo" />
            </div>
            <div class="form-group">
              <label>User @</label>
              <input type="text" id="infInsta" placeholder="instagram" />
            </div>
            <div class="form-group">
              <label>Status Funil</label>
              <select id="infStatus">
                <option>Prospecção</option>
                <option>Abordagem</option>
                <option>Negociação</option>
              </select>
            </div>
          </div>
          <button
            id="btnSalvarInf"
            class="btn-primary"
            style="background: var(--text-main); width: 100%"
          >
            SALVAR NO BACKSTAGE
          </button>
        </div>
      </div>

      <div class="crm-wrapper">
        <div class="table-toolbar">
          <h3
            style="
              margin: 0;
              font-family: &quot;Unbounded&quot;;
              font-size: 0.85rem;
            "
          >
            Pipeline de Influenciadores
          </h3>
          <button
            id="btnSync"
            style="
              background: var(--bitto-green);
              border: none;
              padding: 8px 16px;
              border-radius: 6px;
              font-weight: 800;
              font-size: 10px;
              cursor: pointer;
              color: #000;
            "
          >
            🔄 ATUALIZAR DADOS
          </button>
        </div>
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>Influencer</th>
                <th>Status Atual</th>
                <th>Aquecimento</th>
                <th>Ativos / Cupom</th>
                <th style="text-align: center">Plano</th>
                <th style="text-align: right">Ações</th>
              </tr>
            </thead>
            <tbody id="listaInfluencers"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="toast">Sucesso!</div>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
