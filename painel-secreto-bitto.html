<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage // Bitto Workspace</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #ffffff;
        --text-main: #37352f;
        --text-muted: #73726e;
        --border: rgba(55, 53, 47, 0.1);
        --hover: #f1f1f0;
        --bitto-blue: #0035ff;
        --bitto-green: #c2fa11; /* O verde Bitto do seu CSS */
        --notion-shadow: 0 1px 3px rgba(15, 15, 15, 0.1);
      }

      [data-theme="dark"] {
        --bg: #191919;
        --text-main: #d4d4d4;
        --text-muted: #9b9b9b;
        --border: rgba(255, 255, 255, 0.1);
        --hover: #2f2f2f;
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: "Inter Tight", sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        display: none; /* Controlado pelo admin.js */
      }

      /* Custom Scrollbar */
      * {
        scrollbar-color: color-mix(in oklch, currentColor 35%, transparent)
          transparent;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 80px 40px;
      }

      /* Notion Header Style */
      .page-header {
        margin-bottom: 40px;
      }

      .page-title {
        font-size: 40px;
        font-weight: 800;
        margin: 0 0 10px 0;
        letter-spacing: -1.2px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .page-meta {
        font-size: 14px;
        color: var(--text-muted);
        display: flex;
        gap: 15px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 20px;
      }

      /* Notion Block System */
      .block {
        margin-top: 32px;
      }

      .block-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
      }

      .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }

      input,
      select {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 14px;
        color: var(--text-main);
        outline: none;
        width: 100%;
        transition: background 0.2s;
      }

      input:focus {
        background: var(--hover);
        border-color: var(--text-muted);
      }

      .btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-main);
      }

      .btn:hover {
        background: var(--hover);
      }
      .btn-primary {
        color: var(--bitto-blue);
      }

      /* List View (Notion Database Style) */
      .database-item {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 40px;
        padding: 8px;
        border-radius: 4px;
        align-items: center;
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }

      .database-item:hover {
        background: var(--hover);
      }

      .status-pill {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 3px;
        background: var(--hover);
        color: var(--text-main);
        width: fit-content;
      }

      .active-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }

      #themeBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 11px;
        text-transform: uppercase;
        background: none;
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--text-muted);
      }

      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--text-main);
        color: var(--bg);
        padding: 8px 20px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        display: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body data-theme="light">
    <button id="themeBtn">Dark Mode</button>

    <div class="container" data-aos="fade-up" data-aos-duration="700">
      <header class="page-header">
        <h1 class="page-title"><span>⚙️</span> Backstage</h1>
        <div class="page-meta">
          <span><strong>Founder:</strong> Pedro Gabriel</span>
          <span><strong>Status:</strong> Ativo</span>
          <span style="color: var(--bitto-blue); cursor: pointer" id="btnSync"
            >↻ Sincronizar</span
          >
        </div>
      </header>

      <div class="block">
        <div class="block-title">Firebase Access Control</div>
        <div class="input-row">
          <input type="email" id="userEmail" placeholder="student@email.com" />
          <button id="btnLiberar" class="btn btn-primary">Ativar 90d</button>
        </div>
      </div>

      <div class="block">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
          "
        >
          <div class="block-title" style="margin: 0">
            Pipeline de Embaixadores
          </div>
          <div style="display: flex; gap: 8px">
            <input
              type="text"
              id="infNome"
              placeholder="Nome"
              style="width: 150px; margin: 0"
            />
            <input
              type="text"
              id="infInsta"
              placeholder="@insta"
              style="width: 120px; margin: 0"
            />
            <button id="btnSalvarInf" class="btn">Adicionar</button>
          </div>
        </div>

        <div id="listaInfluencers"></div>
      </div>
    </div>

    <div id="toast">Database Updated</div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
