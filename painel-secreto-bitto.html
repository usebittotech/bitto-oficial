<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Bitto Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Unbounded:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      /* Estilos específicos para o painel integrados com seu tema */
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: var(--chat-grid);
        background-size: var(--grid-size);
        padding: 20px;
      }

      .admin-card {
        background: var(--card-bg);
        border: 2px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 2.5rem;
        width: 100%;
        max-width: 450px;
        box-shadow: var(--shadow-soft);
        text-align: center;
        animation: fadeUp 0.4s ease;
      }

      .admin-card h2 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        color: var(--text-main);
      }

      .admin-card p.subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }

      .input-group {
        text-align: left;
        margin-bottom: 1.5rem;
      }

      .input-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--primary-blue);
      }

      .admin-input {
        width: 100%;
        padding: 1rem 1.2rem;
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-main);
        font-family: var(--font-body);
        font-size: 1rem;
        transition: 0.2s;
      }

      .admin-input:focus {
        outline: none;
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(0, 53, 255, 0.1);
      }

      .btn-activate {
        width: 100%;
        padding: 1rem;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: var(--radius-pill);
        font-family: var(--font-display);
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 53, 255, 0.2);
      }

      .btn-activate:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 53, 255, 0.3);
        filter: brightness(1.1);
      }

      .btn-activate:active {
        transform: translateY(0);
      }

      #statusMsg {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        font-weight: 600;
        min-height: 1.2rem;
      }

      .success-msg {
        color: #00b884;
      }
      .error-msg {
        color: #ff4b4b;
      }

      /* Badge de 90 dias */
      .days-badge {
        display: inline-block;
        background: var(--accent-green);
        color: var(--primary-blue);
        padding: 4px 12px;
        border-radius: 8px;
        font-weight: 800;
        font-size: 0.7rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body style="display: none">
    <div class="admin-card">
      <div class="days-badge">ACESSO PRO</div>
      <h2>Painel Admin</h2>
      <p class="subtitle">
        Liberação manual de 90 dias de acesso ilimitado para parceiros e
        influenciadores.
      </p>

      <div class="input-group">
        <label for="userEmail">E-mail do Usuário</label>
        <input
          type="email"
          id="userEmail"
          class="admin-input"
          placeholder="exemplo@email.com"
          spellcheck="false"
        />
      </div>

      <button id="btnLiberar" class="btn-activate">ATIVAR 90 DIAS</button>

      <p id="statusMsg"></p>

      <div style="margin-top: 2rem">
        <a
          href="index.html"
          style="
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
          "
          >← Voltar ao Início</a
        >
      </div>
    </div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
