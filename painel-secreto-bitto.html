<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage // Bitto Workspace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --text: #37352f;
        --text-muted: #73726e;
        --border: rgba(55, 53, 47, 0.16);
        --hover: #f1f1f0;
        --bitto-blue: #0035ff;
        --bitto-green: #c2fa11;
      }

      [data-theme="dark"] {
        --bg: #191919;
        --text: #d4d4d4;
        --text-muted: #9b9b9b;
        --border: rgba(255, 255, 255, 0.14);
        --hover: #2f2f2f;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
        display: none; /* Controlado pelo Auth */
        overflow-x: hidden;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 60px 40px;
        transition: margin-right 0.3s ease;
      }
      .header-title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 40px;
        letter-spacing: -1px;
      }

      .section-block {
        margin-top: 32px;
        border-top: 1px solid var(--border);
        padding-top: 24px;
      }
      .section-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      input,
      select {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 12px;
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: 0.2s;
        box-sizing: border-box;
      }
      input:focus {
        border-color: var(--text-muted);
        background: var(--hover);
      }

      .btn-action {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        color: var(--text);
      }
      .btn-action:hover {
        background: var(--hover);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th {
        text-align: left;
        font-size: 11px;
        color: var(--text-muted);
        padding: 10px;
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
      }
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        vertical-align: middle;
      }

      .progress-bar {
        width: 60px;
        height: 5px;
        background: var(--hover);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 5px;
      }
      .progress-fill {
        height: 100%;
        background: var(--bitto-blue);
        transition: 0.5s;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }

      /* --- SIDE PEEK PANEL --- */
      #sidePeek {
        position: fixed;
        top: 0;
        right: -450px;
        width: 400px;
        height: 100vh;
        background: var(--bg);
        border-left: 1px solid var(--border);
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.05);
        z-index: 2000;
        transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 40px;
      }
      #sidePeek.open {
        right: 0;
      }
      .close-peek {
        cursor: pointer;
        font-size: 20px;
        color: var(--text-muted);
        position: absolute;
        top: 20px;
        right: 20px;
      }

      #themeBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 11px;
        border: 1px solid var(--border);
        background: none;
        color: var(--text-muted);
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 4px;
      }
      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--text);
        color: var(--bg);
        padding: 10px 24px;
        border-radius: 6px;
        display: none;
        z-index: 10000;
      }
    </style>
  </head>
  <body data-theme="light">
    <button id="themeBtn">Dark Mode</button>

    <div class="container">
      <h1 class="header-title">⚙️ Backstage</h1>

      <div class="section-block">
        <div class="section-label">Acesso Firebase</div>
        <div class="input-group">
          <input
            type="email"
            id="userEmail"
            placeholder="E-mail do embaixador..."
            style="flex: 1"
          />
          <button
            id="btnLiberar"
            class="btn-action"
            style="color: var(--bitto-blue)"
          >
            Liberar 90 dias
          </button>
        </div>
      </div>

      <div class="section-block">
        <div class="section-label">Novo Lead (Sheets)</div>
        <div class="input-group">
          <input type="text" id="infNome" placeholder="Nome" style="flex: 1" />
          <input
            type="text"
            id="infInsta"
            placeholder="@instagram"
            style="flex: 1"
          />
          <button id="btnSalvarInf" class="btn-action">Criar Lead</button>
        </div>
      </div>

      <div class="section-block">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
          "
        >
          <div class="section-label">Database: Embaixadores</div>
          <button
            id="btnSync"
            class="btn-action"
            style="font-size: 11px; border: none; text-decoration: underline"
          >
            ↻ Sincronizar
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Funil</th>
              <th>Interações</th>
              <th>Status</th>
              <th style="text-align: right">Gerir</th>
            </tr>
          </thead>
          <tbody id="listaInfluencers"></tbody>
        </table>
      </div>
    </div>

    <div id="sidePeek">
      <span class="close-peek" onclick="togglePeek(false)">✕</span>
      <div id="peekContent">
        <h2 id="peekName" style="margin-bottom: 5px">Nome do Embaixador</h2>
        <p
          id="peekInsta"
          style="color: var(--bitto-blue); font-size: 14px; margin-top: 0"
        >
          @username
        </p>

        <div class="section-block" style="border: none; padding: 0">
          <div class="section-label">Ativos de Campanha</div>
          <label style="font-size: 11px; font-weight: 700"
            >Link Personalizado</label
          >
          <input
            type="text"
            id="editLink"
            style="margin-top: 5px; margin-bottom: 15px"
          />

          <label style="font-size: 11px; font-weight: 700">Cupom</label>
          <input
            type="text"
            id="editCupom"
            style="margin-top: 5px; margin-bottom: 20px"
          />

          <button
            id="btnSavePeek"
            class="btn-action"
            style="
              width: 100%;
              background: var(--bitto-blue);
              color: white;
              border: none;
            "
          >
            Guardar Alterações
          </button>
          <button
            id="btnCopyPeek"
            class="btn-action"
            style="width: 100%; margin-top: 10px"
          >
            Copiar para Ativador
          </button>
        </div>
      </div>
    </div>

    <div id="toast">Sucesso</div>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
