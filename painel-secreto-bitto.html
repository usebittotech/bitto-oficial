<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Bitto | Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #fafafa;
        --blue: #0035ff;
        --green: #ccff00;
        --text: #111;
        --card: #ffffff;
        --border: #e0e0e0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--bg);
        background-image: radial-gradient(var(--blue) 0.5px, transparent 0.5px);
        background-size: 30px 30px;
        display: none;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
      }
      .header {
        text-align: left;
        margin-bottom: 40px;
      }
      h1 {
        font-family: "Unbounded", sans-serif;
        font-size: 32px;
        margin: 0;
        color: var(--text);
      }

      .grid-top {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 25px;
        margin-bottom: 40px;
      }

      .card {
        background: var(--card);
        padding: 25px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      }

      .card-title {
        font-family: "Unbounded", sans-serif;
        font-size: 14px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--blue);
        display: block;
        margin-bottom: 8px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        outline: none;
        margin-bottom: 15px;
        box-sizing: border-box;
        transition: 0.2s;
      }
      input:focus {
        border-color: var(--blue);
      }

      button {
        width: 100%;
        padding: 15px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        font-family: "Unbounded", sans-serif;
        font-size: 12px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 53, 255, 0.3);
      }

      /* Tabela Estilizada */
      .table-container {
        background: white;
        border-radius: 20px;
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .table-header {
        padding: 20px 25px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #fcfcfc;
        padding: 15px 25px;
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        color: #888;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 15px 25px;
        border-bottom: 1px solid #f5f5f5;
        vertical-align: middle;
      }

      .row-insta {
        font-weight: 700;
        color: var(--text);
      }
      .row-nicho {
        font-size: 12px;
        color: #666;
      }

      .status-select {
        padding: 5px 10px;
        font-size: 12px;
        margin: 0;
        width: auto;
      }
      .btn-fire {
        width: auto;
        padding: 8px 15px;
        background: #fff;
        color: var(--text);
        border: 1px solid var(--border);
        font-size: 11px;
      }
      .btn-fire:hover {
        background: #fff3cd;
        color: #856404;
        border-color: #ffeeba;
      }

      .input-table {
        padding: 8px;
        font-size: 12px;
        margin-bottom: 5px;
        border-radius: 8px;
      }

      #statusMsg {
        font-weight: bold;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Admin Control</h1>
        <p style="color: #666; margin-top: 5px">
          Gestão de Embaixadores e Ativação de Acesso
        </p>
      </div>

      <div class="grid-top">
        <div class="card">
          <div class="card-title">🚀 Ativar Plano</div>
          <label>E-mail do Usuário</label>
          <input type="email" id="userEmail" placeholder="exemplo@gmail.com" />
          <button id="btnLiberar">LIBERAR 90 DIAS</button>
          <p id="statusMsg"></p>
        </div>

        <div class="card">
          <div class="card-title">➕ Novo Influencer</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <div>
              <label>Nome</label>
              <input type="text" id="infNome" placeholder="Nome Completo" />
            </div>
            <div>
              <label>Instagram</label>
              <input type="text" id="infInsta" placeholder="@usuario" />
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <div>
              <label>Nicho</label>
              <input type="text" id="infNicho" placeholder="Ex: Estudos/Tech" />
            </div>
            <div>
              <label>Status Inicial</label>
              <select id="infStatus">
                <option value="Prospecção">Prospecção</option>
                <option value="Abordagem">Abordagem</option>
                <option value="Negociação">Negociação</option>
              </select>
            </div>
          </div>
          <button id="btnSalvarInf" style="background: var(--text)">
            CADASTRAR NA PLANILHA
          </button>
        </div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h3
            style="
              margin: 0;
              font-family: &quot;Unbounded&quot;;
              font-size: 14px;
            "
          >
            Acompanhamento de DMs e Negociação
          </h3>
          <button
            id="btnSync"
            style="
              width: auto;
              padding: 10px 20px;
              background: var(--green);
              color: #000;
            "
          >
            🔄 Sincronizar
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Influencer</th>
              <th>Status do Funil</th>
              <th>Interações</th>
              <th>Link / Cupom</th>
              <th>Plano Ativado?</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="listaInfluencers"></tbody>
        </table>
      </div>
    </div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
