<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage // Bitto Control</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #000000;
        --card-bg: rgba(10, 10, 10, 0.7);
        --border: rgba(255, 255, 255, 0.08);
        --text-main: #ededed;
        --text-muted: #888888;
        --primary-blue: #0035ff;
        --primary-green: #ccff00;
        --input-bg: rgba(255, 255, 255, 0.03);
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: "Inter Tight", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: none; /* Controlado pelo Auth */
        -webkit-font-smoothing: antialiased;
      }

      /* --- LAYOUT --- */
      .admin-wrapper {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 50px;
      }

      .logo {
        font-weight: 800;
        font-size: 1.2rem;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo span {
        color: var(--primary-green);
      }

      /* --- GRID DE GESTÃO --- */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 30px;
      }

      .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .glass-card:hover {
        border-color: rgba(255, 255, 255, 0.15);
      }

      .card-header {
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 24px;
        display: flex;
        justify-content: space-between;
      }

      /* --- INPUTS ESTILO SAAS --- */
      .input-field {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        color: #fff;
        font-family: inherit;
        font-size: 0.9rem;
        margin-bottom: 12px;
        outline: none;
        transition: 0.2s;
        box-sizing: border-box;
      }

      .input-field:focus {
        border-color: var(--primary-blue);
        background: rgba(255, 255, 255, 0.06);
      }

      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.85rem;
      }

      .btn-blue {
        background: var(--primary-blue);
        color: white;
      }
      .btn-white {
        background: #fff;
        color: #000;
      }
      .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }

      /* --- TABELA / LISTA --- */
      .crm-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      .crm-table th {
        text-align: left;
        padding: 15px;
        font-size: 0.7rem;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
      }

      .crm-table td {
        padding: 20px 15px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }

      .tr-lead {
        transition: 0.2s;
      }
      .tr-lead:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .status-badge {
        background: rgba(255, 255, 255, 0.05);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        border: 1px solid var(--border);
      }

      .active-glow {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--primary-green);
        box-shadow: 0 0 10px var(--primary-green);
      }

      .btn-delete {
        opacity: 0.3;
        cursor: pointer;
        transition: 0.2s;
        background: none;
        border: none;
        color: #ff4b4b;
      }
      .btn-delete:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      #toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #fff;
        color: #000;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.8rem;
        transform: translateY(150px);
        transition: 0.4s;
        z-index: 1000;
      }
      #toast.show {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="admin-wrapper">
      <header>
        <div class="logo">BACKSTAGE <span>●</span></div>
        <div
          style="font-size: 0.7rem; color: var(--text-muted); font-weight: 600"
        >
          FOUNDER CONTROL PANEL
        </div>
      </header>

      <div class="dashboard-grid">
        <div class="sidebar">
          <div class="glass-card" style="margin-bottom: 20px">
            <div class="card-header">Ativação Firebase</div>
            <input
              type="email"
              id="userEmail"
              class="input-field"
              placeholder="email@exemplo.com"
            />
            <button id="btnLiberar" class="btn btn-blue">
              GRANT 90 DAYS ACCESS
            </button>
          </div>

          <div class="glass-card">
            <div class="card-header">Captura de Lead</div>
            <input
              type="text"
              id="infNome"
              class="input-field"
              placeholder="Nome do Embaixador"
            />
            <input
              type="text"
              id="infInsta"
              class="input-field"
              placeholder="@instagram"
            />
            <input
              type="text"
              id="infCupom"
              class="input-field"
              placeholder="CUPOM"
            />
            <button id="btnSalvarInf" class="btn btn-white">SAVE TO CRM</button>
          </div>
        </div>

        <div class="glass-card">
          <div class="card-header">
            Pipeline de Embaixadores
            <button
              id="btnSync"
              style="
                background: none;
                border: none;
                color: var(--primary-green);
                cursor: pointer;
                font-weight: bold;
                font-size: 10px;
              "
            >
              SYNC DATABASE
            </button>
          </div>

          <table class="crm-table">
            <thead>
              <tr>
                <th>Influencer</th>
                <th>Status</th>
                <th>Assets</th>
                <th style="text-align: center">Plano</th>
                <th style="text-align: right">Ação</th>
              </tr>
            </thead>
            <tbody id="listaInfluencers"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="toast">Ação realizada</div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
