<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage — Bitto Control</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #ffffff;
        --sub-bg: #fafafa;
        --border: #e5e5e5;
        --text-main: #171717;
        --text-muted: #737373;
        --bitto-blue: #0035ff;
        --bitto-green: #ccff00;
        --accent-green-soft: rgba(204, 255, 0, 0.15);
      }

      [data-theme="dark"] {
        --bg: #0a0a0a;
        --sub-bg: #111111;
        --border: #262626;
        --text-main: #ededed;
        --text-muted: #a1a1a1;
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: "Inter", sans-serif;
        margin: 0;
        display: none; /* Controlado pelo Auth */
        -webkit-font-smoothing: antialiased;
      }

      /* Top Navigation Bar */
      nav {
        height: 56px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: var(--bg);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-family: "Geist", sans-serif;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 1px;
      }
      .logo span {
        color: var(--bitto-blue);
      }

      /* Sidebar & Main Layout */
      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 56px);
      }

      aside {
        border-right: 1px solid var(--border);
        padding: 24px;
        background: var(--sub-bg);
      }

      main {
        padding: 40px;
        max-width: 1000px;
      }

      /* Typography & Blocks */
      h2 {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Inputs: Borderless Style */
      .input-box {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text-main);
        width: 100%;
        margin-bottom: 12px;
        transition: all 0.2s;
      }

      .input-box:focus {
        border-color: var(--text-main);
        outline: none;
        box-shadow: 0 0 0 2px var(--border);
      }

      /* Buttons: Solid Linear Style */
      .btn-solid {
        background: var(--text-main);
        color: var(--bg);
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.2s;
      }

      .btn-solid:hover {
        opacity: 0.85;
      }

      /* Data List: High Contrast */
      .data-row {
        display: grid;
        grid-template-columns: 1fr 120px 100px 40px;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        align-items: center;
        background: var(--bg);
        transition: border-color 0.2s;
      }

      .data-row:hover {
        border-color: var(--text-muted);
      }

      .badge-status {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 100px;
        background: var(--sub-bg);
        border: 1px solid var(--border);
        width: fit-content;
      }

      .active-glow {
        width: 6px;
        height: 6px;
        background: var(--bitto-green);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--bitto-green);
      }

      #themeBtn {
        font-size: 11px;
        background: var(--sub-bg);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      #toast {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--text-main);
        color: var(--bg);
        padding: 10px 20px;
        border-radius: 40px;
        font-size: 12px;
        font-weight: 600;
        display: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">BACKSTAGE <span>//</span> BITTO</div>
      <button id="themeBtn">Appearance</button>
    </nav>

    <div class="layout">
      <aside>
        <div data-aos="fade-in">
          <h2>Quick Actions</h2>
          <input
            type="email"
            id="userEmail"
            class="input-box"
            placeholder="User e-mail"
          />
          <button
            id="btnLiberar"
            class="btn-solid"
            style="background: var(--bitto-blue)"
          >
            Activate 90 Days
          </button>

          <div style="margin-top: 40px">
            <h2>New Partnership</h2>
            <input
              type="text"
              id="infNome"
              class="input-box"
              placeholder="Full name"
            />
            <input
              type="text"
              id="infInsta"
              class="input-box"
              placeholder="@handle"
            />
            <button id="btnSalvarInf" class="btn-solid">Add Partner</button>
          </div>
        </div>
      </aside>

      <main data-aos="fade-up" data-aos-duration="700">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
          "
        >
          <h1 style="font-size: 20px; font-weight: 600; margin: 0">
            Partnership Database
          </h1>
          <button
            id="btnSync"
            style="
              background: none;
              border: none;
              color: var(--bitto-blue);
              cursor: pointer;
              font-size: 12px;
              font-weight: 600;
            "
          >
            Sync Database
          </button>
        </div>

        <div id="listaInfluencers"></div>
      </main>
    </div>

    <div id="toast">Changes synchronized</div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
