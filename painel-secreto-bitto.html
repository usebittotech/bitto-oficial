<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstage | Bitto Management</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f9fa;
        --sidebar-bg: #ffffff;
        --bitto-blue: #0035ff;
        --bitto-green: #ccff00;
        --text-main: #1a1d21;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --card-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        display: none; /* Controlado pelo auth */
        min-height: 100vh;
      }

      /* Header / Nav */
      header {
        background: white;
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-family: "Unbounded", sans-serif;
        font-size: 1.2rem;
        letter-spacing: -1px;
      }

      .logo span {
        color: var(--bitto-blue);
      }

      .container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 2rem;
      }

      /* CRM Stats / Cards */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .card {
        background: white;
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 1.5rem;
        box-shadow: var(--card-shadow);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
      }

      /* Inputs Modernos */
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        display: block;
        margin-bottom: 6px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.9rem;
        background: #f1f5f9;
        transition: all 0.2s;
      }

      input:focus {
        outline: none;
        border-color: var(--bitto-blue);
        background: white;
        box-shadow: 0 0 0 3px rgba(0, 53, 255, 0.1);
      }

      .btn-primary {
        background: var(--bitto-blue);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn-secondary {
        background: var(--text-main);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      /* Tabela CRM */
      .crm-container {
        background: white;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--card-shadow);
        overflow: hidden;
      }

      .crm-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #f8f9fa;
        padding: 1rem;
        text-align: left;
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }

      /* Badges e Status */
      .badge-status {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .progress-container {
        width: 100px;
        height: 8px;
        background: #edf2f7;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 5px;
      }
      .progress-bar {
        height: 100%;
        background: var(--bitto-blue);
        transition: width 0.3s;
      }

      .btn-sync {
        background: var(--bitto-green);
        color: #000;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 700;
        border: none;
        cursor: pointer;
      }

      #toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 1rem 2rem;
        background: var(--text-main);
        color: white;
        border-radius: 12px;
        font-weight: 600;
        transform: translateY(200%);
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1000;
      }
      #toast.show {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">BACK<span>STAGE</span></div>
      <div id="admin-info" style="font-size: 0.8rem; color: var(--text-muted)">
        Admin Session: bitto.tech
      </div>
    </header>

    <div class="container">
      <div class="stats-grid">
        <div class="card">
          <div class="card-header">🚀 Ativar Embaixador</div>
          <div class="form-group">
            <label>E-mail da conta Bitto</label>
            <input
              type="email"
              id="userEmail"
              placeholder="usuario@gmail.com"
            />
          </div>
          <button id="btnLiberar" class="btn-primary" style="width: 100%">
            LIBERAR 90 DIAS
          </button>
        </div>

        <div class="card" style="grid-column: span 2">
          <div class="card-header">➕ Novo Lead de Influencer</div>
          <div
            style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem"
          >
            <div class="form-group">
              <label>Nome Completo</label>
              <input type="text" id="infNome" placeholder="Ex: João Silva" />
            </div>
            <div class="form-group">
              <label>User Instagram</label>
              <input type="text" id="infInsta" placeholder="@perfil" />
            </div>
            <div class="form-group">
              <label>Status Funil</label>
              <select id="infStatus">
                <option value="Prospecção">Prospecção</option>
                <option value="Abordagem">Abordagem</option>
                <option value="Negociação">Negociação</option>
              </select>
            </div>
          </div>
          <button id="btnSalvarInf" class="btn-secondary" style="width: 100%">
            ADICIONAR AO PIPELINE
          </button>
        </div>
      </div>

      <div class="crm-container">
        <div class="crm-header">
          <h3
            style="
              margin: 0;
              font-family: &quot;Unbounded&quot;;
              font-size: 1rem;
            "
          >
            Pipeline de Influencers
          </h3>
          <button id="btnSync" class="btn-sync">🔄 Sincronizar Sheets</button>
        </div>
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>Influencer</th>
                <th>Status do Funil</th>
                <th>Interações / Aquecimento</th>
                <th>Link & Cupom</th>
                <th style="text-align: center">Plano</th>
                <th style="text-align: right">Ações</th>
              </tr>
            </thead>
            <tbody id="listaInfluencers"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="toast">Notificação</div>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
