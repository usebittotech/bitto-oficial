<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitto - Acesso</title>
    <link rel="icon" type="image/png" href="/imagens/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-body">

    <a href="../index.html" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>Voltar</span>
    </a>

    <div class="crt-overlay"></div>

    <div class="auth-theme-toggle">
        <button class="icon-button" id="themeToggle" title="Alternar Tema">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-card tilt-element">
            <div class="auth-left">
                <div class="auth-header">
                    <div class="logo-icon">
                        <a href="../index.html">
                            <img src="../imagens/bittoofc.png" alt="Bitto Logo">
                        </a>
                    </div>
                    <h2 id="formTitle">Bem-vindo de volta</h2>
                    <p id="formSubtitle">Entre para continuar seus estudos</p>
                </div>

                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" class="auth-input" placeholder="seu@email.com" required autocomplete="username">
                    </div>
                    
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPass" class="auth-input pass-input" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" class="toggle-pass-btn" tabindex="-1">
                                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <a href="forgot-password.html" class="forgot-pass">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-primary full-width">ENTRAR</button>
                    
                    <div class="divider"><span>ou entre com</span></div>
                    
                    <div class="social-login">
                        <button type="button" class="social-btn full-social" id="googleBtnLogin">
                            Google
                        </button>
                    </div>

                    <p class="auth-footer">
                        Não tem uma conta? <a href="#" id="showRegister">Crie agora</a>
                    </p>
                </form>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="regName" class="auth-input" placeholder="Como devemos te chamar?" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" class="auth-input" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="regPass" class="auth-input pass-input" placeholder="Crie uma senha forte" required>
                            <button type="button" class="toggle-pass-btn" tabindex="-1">
                                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary full-width btn-green">CRIAR MINHA CONTA</button>
                    <div class="divider"><span>ou cadastre com</span></div>
                    <div class="social-login">
                        <button type="button" class="social-btn full-social" id="googleBtnRegister">Google</button>
                    </div>
                    <p class="auth-footer">Já tem conta? <a href="#" id="showLogin">Fazer login</a></p>
                </form>
            </div>

            <div class="auth-right">
                <div class="auth-showcase">
                    <img src="../bittinhos/bittinho-5800.png" alt="Bitto Master" class="floating-mascot">
                    <h3>Domine a Tecnologia</h3>
                    <p>Acompanhe sua evolução, ganhe XP e desbloqueie novos níveis do seu mascote.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
