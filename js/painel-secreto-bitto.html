<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Bitto Admin - Liberar Acesso</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .admin-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #28a745;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <h2>Liberar Bitto Pro (90 dias)</h2>
      <input
        type="email"
        id="userEmail"
        placeholder="E-mail do Influenciador"
      />
      <button id="btnLiberar">Ativar Acesso</button>
      <p id="statusMsg"></p>
    </div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
